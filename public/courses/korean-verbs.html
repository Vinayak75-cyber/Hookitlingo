<style>
/* ============================================================
   TOKENS — same palette as every Hookitlingo course
   ============================================================ */
:root{
  --ink:#1c1420; --surface:#26192b; --surface2:#2f2035; --surface3:#3b2941;
  --border:#4a3550;
  --text:#f6ecec; --text-dim:#c7b2c4; --text-faint:#8f7a91;
  --vermilion:#e58aa2; --vermilion-dim:#5a2c3a;
  --celadon:#5fa688; --celadon-dim:#2a4a3d;
  --gold:#d9ab5c; --gold-dim:#5c471e;
  --inkblue:#a084c9; --inkblue-dim:#3a2c50;
  --petal:#f3b6c6;
  --radius:16px; --radius-sm:10px;
  --serif:"Cormorant Garamond","Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --kr:"Noto Serif KR","Apple SD Gothic Neo","Malgun Gothic","Nanum Gothic",sans-serif;
  --maxw:880px;
  --fs-scale:1;
}
html[data-theme="light"]{
  --ink:#fdf3ef; --surface:#fffaf6; --surface2:#fbeee6; --surface3:#f5dfd6;
  --border:#eccabb;
  --text:#3a2530; --text-dim:#79576a; --text-faint:#a98a9c;
  --vermilion:#c8546f; --vermilion-dim:#f6dae2;
  --celadon:#3f7d63; --celadon-dim:#d9ece2;
  --gold:#a4762b; --gold-dim:#f2e2c2;
  --inkblue:#75509f; --inkblue-dim:#e7ddf2;
  --petal:#e59fb2;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; color:var(--text); font-family:var(--sans);
  font-size:calc(16px*var(--fs-scale)); line-height:1.65; transition:background .3s,color .3s;
  background:
    radial-gradient(1100px 620px at 12% -8%, color-mix(in srgb, var(--vermilion) 16%, transparent), transparent 58%),
    radial-gradient(900px 520px at 104% 6%, color-mix(in srgb, var(--gold) 12%, transparent), transparent 55%),
    var(--ink);
  background-attachment:fixed;
}
body.print-mode{background:#fff;color:#111;}
::selection{background:var(--vermilion); color:#fff;}
h1,h2,h3,h4{font-family:var(--serif); font-weight:600; letter-spacing:.2px; margin:0 0 .5em;}
h1{font-size:2.2em;} h2{font-size:1.6em;} h3{font-size:1.25em;} h4{font-size:1.05em;}
p{margin:0 0 1em;}
a{color:var(--celadon);}
.kr{font-family:var(--kr);}
.kr-rom{font-family:var(--serif); font-style:italic; color:var(--gold); font-size:.7em; margin-left:4px; white-space:nowrap;}
button{font-family:var(--sans); cursor:pointer;}
.hidden{display:none !important;}

/* Petals */
.petals{position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden;}
.petal{position:absolute; top:-8%; will-change:transform; animation:petal-fall linear infinite;}
.petal svg{display:block; filter:drop-shadow(0 1px 1px rgba(0,0,0,.08));}
@keyframes petal-fall{0%{transform:translate(0,-10vh) rotate(0deg);} 100%{transform:translate(var(--drift,50px), 112vh) rotate(340deg);}}
@media (prefers-reduced-motion: reduce){ .petals{display:none;} }
@media print{ .petals{display:none;} }
@media(max-width:900px){ .petals .petal:nth-child(even){display:none;} }

/* Layout shell */
#app{display:flex; min-height:100vh; position:relative; z-index:2;}
#sidebar{
  width:280px; flex:none; background:var(--surface); border-right:1px solid var(--border);
  position:sticky; top:0; height:100vh; overflow-y:auto; padding:18px 14px 40px; transition:transform .3s; z-index:40;
}
#sidebar::-webkit-scrollbar{width:6px;} #sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.brand{display:flex; align-items:center; gap:10px; padding:6px 8px 18px; border-bottom:1px solid var(--border); margin-bottom:14px;}
.brand-block{
  width:44px;height:44px;border-radius:50%; flex:none; position:relative;
  background:radial-gradient(circle at 33% 28%, color-mix(in srgb, var(--vermilion) 88%, #fff 12%), var(--vermilion) 72%);
  display:flex;align-items:center;justify-content:center; font-family:var(--kr); font-weight:700; font-size:19px; color:#fff9f7;
  transform:rotate(-7deg); box-shadow:0 4px 12px color-mix(in srgb, var(--vermilion) 50%, transparent), inset 0 0 0 2px color-mix(in srgb, #fff 22%, transparent);
}
.brand-txt strong{display:block; font-family:var(--serif); font-size:1.05em;}
.brand-txt span{display:block; font-size:.72em; color:var(--text-faint); letter-spacing:.08em; text-transform:uppercase;}

.progress-mini{margin:0 8px 16px; padding:10px 12px; background:var(--surface2); border-radius:var(--radius-sm); border:1px solid var(--border);}
.progress-mini .row{display:flex; justify-content:space-between; font-size:.78em; color:var(--text-dim); margin-bottom:6px;}
.bar-track{height:6px; background:var(--surface3); border-radius:4px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg,var(--vermilion),var(--gold)); width:0%; transition:width .4s;}
.streak-row{display:flex; justify-content:space-between; font-size:.78em; color:var(--text-dim); margin-top:6px;}
.streak-row b{color:var(--gold); font-family:var(--serif);}

.nav-group{margin-bottom:6px;}
.nav-group-label{font-size:.68em; text-transform:uppercase; letter-spacing:.1em; color:var(--text-faint); padding:14px 10px 6px;}
.nav-item{display:flex; align-items:center; gap:9px; width:100%; text-align:left; padding:8px 10px; border-radius:8px; background:transparent; border:none; color:var(--text-dim); font-size:.88em; margin-bottom:1px;}
.nav-item:hover{background:var(--surface2); color:var(--text);}
.nav-item.active{background:var(--vermilion-dim); color:var(--vermilion); font-weight:600;}
html[data-theme="light"] .nav-item.active{color:#8a2c4a;}
.nav-item .dot{width:6px;height:6px;border-radius:50%; background:var(--border); flex:none;}
.nav-item.done .dot{background:var(--celadon);}
.nav-item .lbl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

#mainWrap{flex:1; min-width:0; display:flex; flex-direction:column;}
#topbar{position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:10px; padding:10px 20px 14px; background:color-mix(in srgb, var(--ink) 85%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);}
#topbar::after{content:''; position:absolute; left:0; right:0; bottom:-1px; height:7px; background-image: radial-gradient(circle at 9px 0, transparent 8px, color-mix(in srgb, var(--vermilion) 45%, var(--border)) 8px, color-mix(in srgb, var(--vermilion) 45%, var(--border)) 9px, transparent 9px); background-size:18px 10px; background-repeat:repeat-x; opacity:.55; pointer-events:none;}
#menuBtn{display:none; background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;}
.readbar-track{flex:1; height:4px; background:var(--surface2); border-radius:3px; overflow:hidden;}
.readbar-fill{height:100%; width:0%; background:linear-gradient(90deg,var(--celadon),var(--inkblue)); transition:width .15s;}
.topbtn{background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); border-radius:8px; padding:6px 10px; font-size:.85em; display:flex; align-items:center; gap:5px;}
.topbtn:hover{color:var(--text); border-color:var(--celadon);}
.topbtn.active-toggle{color:var(--gold); border-color:var(--gold-dim);}
#searchBox{background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 10px; font-size:.85em; width:150px;}
#searchResults{position:absolute; top:52px; right:20px; width:320px; max-height:60vh; overflow:auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:0 20px 50px rgba(0,0,0,.5); z-index:60;}
#searchResults .sr-item{padding:10px 12px; border-bottom:1px solid var(--border); font-size:.85em; cursor:pointer;}
#searchResults .sr-item:hover{background:var(--surface2);}

main{flex:1; padding:36px 40px 80px; max-width:var(--maxw); margin:0 auto; width:100%;}
.chapter{display:none; animation:fadeIn .35s ease;}
.chapter.active{display:block;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

.eyebrow{font-size:.75em; letter-spacing:.14em; text-transform:uppercase; color:var(--vermilion); font-weight:700; margin-bottom:8px;}
.chapter-meta{display:flex; gap:14px; color:var(--text-faint); font-size:.82em; margin-bottom:26px; flex-wrap:wrap;}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin:18px 0;}
.callout{border-left:3px solid var(--celadon); background:var(--celadon-dim); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:14px 18px; margin:18px 0; color:var(--text);}
.callout.warn{border-color:var(--vermilion); background:var(--vermilion-dim);}
.callout.tip{border-color:var(--gold); background:var(--gold-dim);}
.callout.fact{border-color:var(--inkblue); background:var(--inkblue-dim);}
.callout-label{font-weight:700; font-size:.78em; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; display:block;}

.spk-btn{background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); border-radius:20px; padding:5px 12px; font-size:.78em; display:inline-flex; align-items:center; gap:6px; flex:none;}
.spk-btn:hover{border-color:var(--vermilion); color:var(--vermilion);}
.spk-btn.loading{opacity:.5; pointer-events:none;}
.spk-btn.playing{border-color:var(--celadon); color:var(--celadon);}

.btn{background:linear-gradient(135deg,var(--vermilion), color-mix(in srgb, var(--vermilion) 55%, var(--gold) 45%)); color:#fff; border:none; border-radius:999px; padding:11px 22px; font-size:.9em; font-weight:600; letter-spacing:.2px;}
.btn:hover{filter:brightness(1.06); box-shadow:0 6px 18px color-mix(in srgb, var(--vermilion) 35%, transparent);}
.btn.secondary{background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:999px;}
.btn.secondary:hover{border-color:var(--celadon); color:var(--celadon);}
.btn:disabled{opacity:.4; cursor:default;}
.btn-row{display:flex; gap:10px; flex-wrap:wrap; margin:16px 0;}

/* Sentence rows (from "sentence-list" content blocks) */
.sen-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; margin:8px 0;}
.sen-row .kr{font-size:1.2em;}
.sen-row .eng{color:var(--text-dim); font-size:.88em; margin-left:auto;}

/* Dialogue blocks */
.dlg-wrap{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin:16px 0;}
.dlg-title{font-family:var(--serif); font-style:italic; color:var(--text-faint); font-size:.88em; margin-bottom:14px; padding-bottom:10px; border-bottom:1px dashed var(--border);}
.dlg-line{display:flex; gap:12px; align-items:flex-start; margin-bottom:16px;}
.dlg-line:last-child{margin-bottom:0;}
.dlg-spk{flex:none; width:74px; font-family:var(--serif); font-weight:600; color:var(--gold); font-size:.85em; padding-top:3px;}
.dlg-body{flex:1; min-width:0;}
.dlg-kr{font-size:1.18em; margin-bottom:3px; line-height:1.6;}
.sen-rom{color:var(--gold); font-family:var(--serif); font-style:italic; font-size:.85em; margin-bottom:3px;}
.sen-eng{color:var(--text-dim); font-size:.88em;}

/* Conjugation tables */
.cheat-table{width:100%; border-collapse:collapse; font-size:.92em; margin:14px 0;}
.cheat-table th,.cheat-table td{padding:8px 10px; border-bottom:1px solid var(--border); text-align:left;}
.cheat-table th{color:var(--text-faint); font-weight:600; font-size:.78em; text-transform:uppercase; letter-spacing:.04em; background:var(--surface2);}
.cheat-table td.kr{font-size:1.08em;}
.cheat-table tr:nth-child(even){background:color-mix(in srgb, var(--surface2) 45%, transparent);}

/* Quiz */
.quiz-q{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin:16px 0;}
.quiz-q .qtext{font-size:1.1em; margin-bottom:14px;}
.qopts{display:flex; flex-direction:column; gap:10px;}
.qopt{background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; text-align:left; color:var(--text); font-size:.95em;}
.qopt:hover{border-color:var(--celadon);}
.qopt.correct{background:var(--celadon-dim); border-color:var(--celadon); color:var(--celadon);}
.qopt.wrong{background:var(--vermilion-dim); border-color:var(--vermilion); color:var(--vermilion);}
.qopt:disabled{pointer-events:none;}
.qfeedback{margin-top:10px; font-size:.85em; color:var(--text-dim); min-height:1.2em;}
.quiz-score{font-family:var(--serif); font-size:1.4em; text-align:center; margin:20px 0;}

/* Flashcards */
.flash-wrap{max-width:420px; margin:20px auto;}
.flashcard{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); height:220px; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:20px; cursor:pointer; user-select:none; position:relative;}
.flashcard .fc-face{font-family:var(--kr); font-size:2em;}
.flashcard .fc-rom{font-family:var(--serif); font-style:italic; color:var(--gold); font-size:.5em; margin-top:8px;}
.flashcard .fc-sub{color:var(--text-faint); font-size:.8em; margin-top:10px;}
.flashcard .fc-back{display:none;}
.flashcard.flipped .fc-front{display:none;} .flashcard.flipped .fc-back{display:flex; flex-direction:column; align-items:center;}
.flash-controls{display:flex; justify-content:space-between; align-items:center; margin-top:14px;}
.flash-counter{color:var(--text-faint); font-size:.85em;}

/* Matching game */
.match-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:20px 0;}
@media(max-width:600px){.match-grid{grid-template-columns:repeat(3,1fr);}}
.match-card{aspect-ratio:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; display:flex;align-items:center;justify-content:center; flex-direction:column; font-family:var(--kr); font-size:1em; padding:6px; text-align:center;}
.match-card .mc-rom{display:block; font-family:var(--serif); font-style:italic; color:var(--gold); font-size:.5em; margin-top:3px;}
.match-card.sel{border-color:var(--gold); background:var(--gold-dim);}
.match-card.matched{border-color:var(--celadon); background:var(--celadon-dim); opacity:.55;}

.badge-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:14px; margin:18px 0;}
.badge{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 10px; text-align:center; opacity:.35;}
.badge.earned{opacity:1; border-color:var(--gold);}
.badge .bicon{font-size:2em; margin-bottom:6px;}
.badge .bname{font-size:.78em; color:var(--text-dim);}

.toc-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; margin:24px 0;}
.toc-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; cursor:pointer;}
.toc-card:hover{border-color:var(--vermilion);}
.toc-card .num{font-family:var(--serif); color:var(--vermilion); font-size:.85em;}
.toc-card h4{margin:4px 0 2px;}
.toc-card p{color:var(--text-faint); font-size:.82em; margin:0;}

.cover{min-height:calc(100vh - 60px); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 20px;}
.presents{font-family:var(--serif); font-style:italic; color:var(--text-faint); font-size:1.05em; letter-spacing:.03em; margin-bottom:10px;}
.powered-by{position:fixed; right:14px; bottom:14px; z-index:50; background:var(--surface2); border:1px solid var(--border); color:var(--text-faint); font-size:.72em; letter-spacing:.03em; padding:6px 12px; border-radius:20px; text-decoration:none; box-shadow:0 8px 24px rgba(0,0,0,.25); transition:color .2s, border-color .2s;}
.powered-by:hover{color:var(--vermilion); border-color:var(--vermilion);}
@media(max-width:900px){.powered-by{right:10px; bottom:10px; font-size:.68em; padding:5px 10px;}}
.cover-block{width:210px;height:210px; margin:0 auto 26px;}
.cover-block svg{width:100%;height:100%;}
.cover h1{font-size:2.5em; margin-bottom:6px;}
.cover .sub{color:var(--text-dim); font-size:1.15em; max-width:560px; margin:0 auto 26px;}
.cover-stats{display:flex; gap:30px; margin:26px 0; flex-wrap:wrap; justify-content:center;}
.cover-stats div{text-align:center;}
.cover-stats b{display:block; font-family:var(--serif); font-size:1.6em; color:var(--gold);}
.cover-stats span{color:var(--text-faint); font-size:.78em; text-transform:uppercase; letter-spacing:.06em;}

mark{background:var(--gold-dim); color:var(--text); padding:0 2px; border-radius:2px;}
textarea.note-area{width:100%; min-height:90px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px; font-family:var(--sans); font-size:.9em; resize:vertical;}

.certificate{border:3px double var(--gold); border-radius:var(--radius); padding:50px 40px; text-align:center; background:var(--surface); margin:20px 0; position:relative; overflow:hidden;}
.certificate::before{content:''; position:absolute; width:260px; height:260px; right:-80px; top:-80px; border-radius:50%; background:radial-gradient(circle, color-mix(in srgb, var(--gold) 18%, transparent), transparent 70%); pointer-events:none;}
.certificate::after{content:'印'; position:absolute; right:34px; bottom:28px; width:64px; height:64px; border-radius:10px; border:3px solid var(--vermilion); color:var(--vermilion); font-size:30px; font-weight:700; display:flex; align-items:center; justify-content:center; transform:rotate(-9deg); opacity:.88;}
.certificate h2{font-family:var(--serif); font-size:2em; color:var(--gold);}
.certificate .cert-name{font-family:var(--serif); font-style:italic; font-size:1.8em; border-bottom:1px solid var(--border); display:inline-block; padding:4px 30px; margin:16px 0;}

@media print{
  #sidebar,#topbar,.no-print,.spk-btn{display:none !important;}
  #mainWrap{width:100%;}
  main{max-width:100%; padding:0;}
  body{background:#fff; color:#000;}
  .chapter{display:block !important;}
}
@media(max-width:900px){
  #sidebar{position:fixed; left:0; top:0; transform:translateX(-100%); box-shadow:0 0 40px rgba(0,0,0,.5);}
  #sidebar.open{transform:translateX(0);}
  #menuBtn{display:block;}
  main{padding:24px 18px 70px;}
  #searchBox,#searchResults{display:none;}
  #topbar{flex-wrap:wrap; row-gap:8px;}
  .topbtn{padding:6px 8px; font-size:.8em;}
}
@media(max-width:480px){
  #topbar{padding:10px 14px 12px;}
  .topbtn{padding:5px 7px; font-size:.72em; gap:3px;}
  .cover h1{font-size:2.1em;}
  .cover .sub{font-size:1em;}
}
.focus-mode #sidebar, .focus-mode #topbar .aux{display:none;}
.overlay-bg{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:35; display:none;}
.overlay-bg.show{display:block;}

/* ============================================================
   SUPPORT PAGE — donation flow (sakura theme, full-page)
   ============================================================ */
.nav-item-support{
  background:linear-gradient(135deg, color-mix(in srgb, var(--vermilion) 16%, transparent), color-mix(in srgb, var(--gold) 12%, transparent));
  border:1px solid color-mix(in srgb, var(--vermilion) 30%, var(--border));
  margin-top:4px;
}
.nav-item-support .lbl{color:var(--vermilion); font-weight:600;}
.nav-item-support:hover{border-color:var(--vermilion);}

.support-page{
  position:relative; min-height:calc(100vh - 60px); display:flex; align-items:center; justify-content:center;
  text-align:center; padding:60px 20px; overflow:hidden;
}
.support-bg{
  position:absolute; top:0; left:50%; width:100vw; height:100%; margin-left:-50vw;
  pointer-events:none; z-index:0; overflow:hidden;
}
.support-bg .tree{ position:absolute; bottom:-2%; width:240px; opacity:.9; transform-origin:50% 100%; }
.support-bg .tree-left{ left:1%; animation:treeSway 7s ease-in-out infinite; }
.support-bg .tree-right{ right:1%; animation:treeSwayR 7s ease-in-out infinite; animation-delay:-3.2s; }
@keyframes treeSway{ 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(1.4deg);} }
@keyframes treeSwayR{ 0%,100%{transform:scaleX(-1) rotate(0deg);} 50%{transform:scaleX(-1) rotate(1.4deg);} }
@media(max-width:900px){ .support-bg .tree{ width:130px; opacity:.5; } }
@media (prefers-reduced-motion: reduce){ .support-bg .tree{ animation:none; } .support-bg .tree-right{ transform:scaleX(-1); } }

.support-card{
  position:relative; z-index:1; width:100%; max-width:440px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius); padding:42px 34px 34px;
  box-shadow:0 30px 80px rgba(0,0,0,.35);
  animation:supportPop .5s cubic-bezier(.2,.9,.2,1);
}
@keyframes supportPop{ from{opacity:0; transform:translateY(18px) scale(.97);} to{opacity:1; transform:translateY(0) scale(1);} }
.support-icon{font-size:2.6em; margin-bottom:12px;}
.support-card h2{font-size:1.55em; margin-bottom:12px;}
.support-card p{color:var(--text-dim);}
.support-back{background:none; border:none; color:var(--text-faint); font-size:.8em; margin-bottom:16px; padding:2px;}
.support-back:hover{color:var(--text);}

.hkl-amounts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0 14px;}
.hkl-amt{
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:14px 8px; font-family:var(--serif); font-size:1.25em; font-weight:600; color:var(--text);
  transition:border-color .2s, background .2s, color .2s;
}
.hkl-amt:hover{border-color:var(--vermilion);}
.hkl-amt.selected{border-color:var(--vermilion); background:var(--vermilion-dim); color:var(--vermilion);}
.hkl-custom-row{
  display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:22px;
}
.hkl-custom-row span{color:var(--text-faint); font-weight:600;}
.hkl-custom-row input{
  flex:1; background:none; border:none; outline:none; color:var(--text); font-family:var(--serif);
  font-size:1.1em; font-weight:600; min-width:0;
}
.hkl-secure-note{margin-top:16px; font-size:.74em; color:var(--text-faint);}
.hkl-loading-spinner{
  width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--vermilion);
  border-radius:50%; animation:spin 1s linear infinite; margin:22px auto;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Bowing thank-you character */
.support-card.support-card--thanks{ max-width:500px; padding:46px 34px 36px; }
.hkl-bow-char{ width:160px; height:auto; display:block; margin:0 auto 10px; overflow:visible; }
.hkl-bow-upper{ transform-box:fill-box; transform-origin:50% 88%; animation:hklBow 2.3s ease-in-out; }
@keyframes hklBow{
  0%   { transform:rotate(0deg); }
  32%  { transform:rotate(24deg); }
  58%  { transform:rotate(24deg); }
  100% { transform:rotate(0deg); }
}
@media (prefers-reduced-motion: reduce){ .hkl-bow-upper{ animation:none; } }

/* Locked certificate teaser */
.cert-locked{ max-width:520px; margin:10px auto 0; text-align:center; }
.cert-locked-silhouette{ position:relative; margin:0 auto 22px; max-width:400px; }
.cert-locked-silhouette svg{ display:block; width:100%; filter:blur(2.5px); opacity:.55; }
.cert-lock-icon{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:2.6em; filter:drop-shadow(0 2px 6px rgba(0,0,0,.3)); }
.cert-locked h3{ margin-bottom:10px; }
.cert-locked p{ color:var(--text-dim); }
#certPayArea{ margin-top:18px; }
</style>
</head>

<script>
const UNITS = [{"id": "u0", "num": 0, "group": "Orientation", "title": "The Shape of a Korean Verb", "kr": "동사의 모양", "intro": "Every Korean sentence you'll ever build stands on one thing: the verb at the very end. Before we touch tenses, let's look at the shape a Korean verb actually has - because once you see it clearly, everything after this unit is just variations on a single theme.", "body": [{"type": "p", "text": "Open any Korean dictionary and every single verb or adjective is listed the same way: ending in <span class=\"kr\">다</span> (-da). <span class=\"kr\">가다</span> (to go), <span class=\"kr\">먹다</span> (to eat), <span class=\"kr\">예쁘다</span> (to be pretty). This is called the <strong>dictionary form</strong>, and it never changes - it's your anchor."}, {"type": "p", "text": "Strip off that <span class=\"kr\">다</span> and what's left is the <strong>stem</strong> - the part that carries the actual meaning. <span class=\"kr\">가</span>- from <span class=\"kr\">가다</span>, <span class=\"kr\">먹</span>- from <span class=\"kr\">먹다</span>. Every tense, every politeness level, every negation you'll learn in this course is built by taking that stem and attaching something to the end of it."}, {"type": "tip", "text": "English conjugates for person: I go, you go, she <strong>goes</strong>, we go. Korean does not. One verb form covers I/you/he/she/we/they equally. Once you learn how to say '갑니다' (go), it works for every subject - no memorizing six versions of one verb."}, {"type": "sentence-list", "items": [{"kr": "가다", "rom": "gada", "eng": "to go (dictionary form)"}, {"kr": "먹다", "rom": "meokda", "eng": "to eat (dictionary form)"}, {"kr": "보다", "rom": "boda", "eng": "to see / watch (dictionary form)"}, {"kr": "읽다", "rom": "ikda", "eng": "to read (dictionary form)"}, {"kr": "공부하다", "rom": "gongbuhada", "eng": "to study (dictionary form)"}]}, {"type": "fun", "text": "Korean sentence order is Subject-Object-Verb, so the verb is always the last word - meaning once you're confident with verb endings, you can often understand the gist of a sentence before it even finishes, just from the nouns."}, {"type": "p", "text": "Meet the two people whose lives we'll follow through this course: <strong>수민 (Sumin)</strong>, a university student starting a new semester and a part-time cafe job, and <strong>제이슨 (Jason)</strong>, her exchange-student friend who is fluent in English and still finding his footing in Korean. Every example sentence from here on is something one of them actually says."}], "quiz": [{"q": "What does every Korean verb's dictionary form end in?", "options": ["-요", "-다", "-니다", "-어"], "correct": 1, "explain": "Every dictionary-form verb or adjective ends in 다 (-da). That's how they're listed in any dictionary."}, {"q": "What do you get when you remove 다 from 먹다?", "options": ["먹", "머그", "먹다", "머"], "correct": 0, "explain": "Removing 다 from 먹다 leaves the stem 먹-, which is what every ending attaches to."}, {"q": "How many different verb forms does Korean need for 'I go' vs 'she goes'?", "options": ["Two - one per subject", "Six - one per pronoun", "One - the same form works for any subject", "Three - singular, plural, formal"], "correct": 2, "explain": "Korean verbs don't change for person or number. One conjugated form covers every subject."}]}, {"id": "u1", "num": 1, "group": "Present Tense", "title": "Finding the Stem & the A/EO Rule", "kr": "아/어 규칙", "intro": "This is the single most important rule in this entire course. Nearly every tense you'll learn - present, past, even parts of the future - is built on this one vowel-harmony decision. Get comfortable here and the rest of the course moves fast.", "body": [{"type": "p", "text": "Look at the very last vowel in a verb's stem. If that vowel is <span class=\"kr\">ㅏ</span> or <span class=\"kr\">ㅗ</span> (a 'bright' vowel), the verb takes <span class=\"kr\">아</span>-endings. If it's anything else - <span class=\"kr\">ㅓ, ㅜ, ㅡ, ㅣ</span>, etc. - it takes <span class=\"kr\">어</span>-endings. There's one shortcut: any verb ending in <span class=\"kr\">하다</span> (like <span class=\"kr\">공부하다</span>) simply becomes <span class=\"kr\">해</span>, no matter what."}, {"type": "fun", "text": "This split isn't random. It's a fossil from Middle Korean, which had a whole system of 'bright' vowels (associated with light, yang) and 'dark' vowels (associated with shadow, yin) - an old Yin-Yang-style symmetry baked directly into the grammar over 500 years ago."}, {"type": "table", "headers": ["Stem's last vowel", "Rule", "Example"], "rows": [["a or o (bright)", "+ 아", "가다 -> 가 + 아 -> 가"], ["everything else (dark)", "+ 어", "먹다 -> 먹 + 어 -> 먹어"], ["하다 verbs", "-> 해", "공부하다 -> 공부해"]]}, {"type": "tip", "text": "Notice 가다 -> 가: when the stem already ends in ㅏ, adding 아 just merges into the same sound, so 가 + 아 collapses to 가, not 가아. This vowel-merging happens with several common verbs - you'll get a feel for it fast because it's always about making the sound easier to say."}, {"type": "sentence-list", "items": [{"kr": "가다 -> 가요", "rom": "gada -> gayo", "eng": "to go -> goes/go (polite)"}, {"kr": "먹다 -> 먹어요", "rom": "meokda -> meogeoyo", "eng": "to eat -> eats/eat (polite)"}, {"kr": "공부하다 -> 공부해요", "rom": "gongbuhada -> gongbuhaeyo", "eng": "to study -> studies/study (polite)"}, {"kr": "보다 -> 봐요", "rom": "boda -> bwayo", "eng": "to watch -> watches/watch (polite)"}, {"kr": "읽다 -> 읽어요", "rom": "ikda -> ilgeoyo", "eng": "to read -> reads/read (polite)"}]}], "quiz": [{"q": "먹다's stem is 먹-. Its last vowel is eo. Which ending does it take?", "options": ["아", "어", "여", "지"], "correct": 1, "explain": "eo is not a or o, so it's a 'dark' vowel and takes the 어 ending: 먹 + 어 = 먹어."}, {"q": "What does every 하다 verb's stem become before an ending?", "options": ["하아", "해", "하어", "호"], "correct": 1, "explain": "하다 verbs are the one fixed exception - they always become 해, regardless of the vowel rule."}, {"q": "가다's stem 가- ends in a. What happens when you add 아?", "options": ["It becomes 가아, said in full", "It merges into just 가", "It becomes 개", "It stays as 가다"], "correct": 1, "explain": "가 + 아 merges into a single 가 - the identical vowel sound doesn't double up."}, {"q": "보다's stem 보- ends in o. Which rule applies, and what happens?", "options": ["어 rule, becomes 보어", "아 rule, merges into 봐", "어 rule, stays as 보어다", "아 rule, becomes 보아다 in full"], "correct": 1, "explain": "o is a bright vowel, so it's the 아 rule - and 보 + 아 merges into 봐, following the same vowel-merging pattern as 가다."}]}, {"id": "u2", "num": 2, "group": "Present Tense", "title": "Present Tense: -Ayo/Eoyo (Polite Informal)", "kr": "현재형: 아요/어요", "intro": "You now know the rule. This unit is where you actually use it, over and over, until 아요/어요 feels automatic. This is the form you'll reach for in about nine out of every ten sentences you speak in Korean.", "body": [{"type": "p", "text": "To build the present tense in the friendly, everyday register Koreans call 해요체 (haeyo-che), take the stem, apply the a/eo rule from the last unit, and add <span class=\"kr\">요</span> at the end for politeness. That's the whole formula: <strong>stem + 아/어 + 요</strong>."}, {"type": "p", "text": "Let's follow 수민's morning. She wakes up, gets ready, and heads to her new semester."}, {"type": "dialogue", "items": [{"speaker": "수민", "kr": "저는 아침에 일어나요.", "rom": "jeoneun achim-e ireonayo.", "eng": "I wake up in the morning."}, {"speaker": "수민", "kr": "밥을 먹어요.", "rom": "babeul meogeoyo.", "eng": "I eat a meal."}, {"speaker": "수민", "kr": "학교에 가요.", "rom": "hakgyo-e gayo.", "eng": "I go to school."}, {"speaker": "수민", "kr": "친구를 만나요.", "rom": "chinguleul mannayo.", "eng": "I meet a friend."}]}, {"type": "tip", "text": "해요체 doesn't just mean 'present tense' - it's also used for near-future plans and general routines/habits. '저는 매일 커피를 마셔요' can mean 'I drink coffee every day' just as naturally as 'I'm drinking coffee (right now).' Context tells you which."}, {"type": "sentence-list", "items": [{"kr": "일어나다 -> 일어나요", "rom": "ireonada -> ireonayo", "eng": "to wake up -> wake up"}, {"kr": "마시다 -> 마셔요", "rom": "masida -> masyeoyo", "eng": "to drink -> drink"}, {"kr": "만나다 -> 만나요", "rom": "mannada -> mannayo", "eng": "to meet -> meet"}, {"kr": "살다 -> 살아요", "rom": "salda -> sarayo", "eng": "to live -> live"}, {"kr": "일하다 -> 일해요", "rom": "ilhada -> ilhaeyo", "eng": "to work -> work"}]}], "quiz": [{"q": "What's the full formula for 해요체 present tense?", "options": ["stem + 다", "stem + 아/어 + 요", "stem + 니다", "stem + 았/었 + 요"], "correct": 1, "explain": "Present tense in the everyday polite register is stem + 아/어 (following the vowel rule) + 요."}, {"q": "마시다 (to drink) - its stem is 마시-. What's the correct 해요체 form?", "options": ["마셔요", "마시요", "마시어요 said in full", "마셔"], "correct": 0, "explain": "마시 + 어 contracts to 셔, giving 마셔요 - a common contraction with i-ending stems."}, {"q": "수민 says '학교에 가요.' What is she saying?", "options": ["I ate at school", "I go to school", "I saw the school", "I studied at school"], "correct": 1, "explain": "학교에 가요 = 'I go to school' (or 'I'm going to school'), using 가다 -> 가요."}, {"q": "Which of these best captures what 해요체 is used for?", "options": ["Only actions happening this exact second", "Present actions, routines/habits, and near-future plans", "Only formal writing", "Only past events"], "correct": 1, "explain": "해요체 covers present actions, ongoing habits/routines, and near-future plans - it's flexible by context."}]}, {"id": "u3", "num": 3, "group": "Present Tense", "title": "Present Tense: -mnida/Seumnida (Formal)", "kr": "현재형: ㅂ니다/습니다", "intro": "There's a second present tense in Korean - same meaning, completely different feel. This is the one you'll hear from news anchors, in business meetings, and in formal presentations.", "body": [{"type": "p", "text": "If the stem ends in a vowel, add <span class=\"kr\">ㅂ니다</span>. If it ends in a consonant, add <span class=\"kr\">습니다</span>. Unlike 해요체, this form doesn't care about the a/eo vowel rule at all - it's purely about vowel vs. consonant at the end of the stem."}, {"type": "table", "headers": ["Stem ends in...", "Rule", "Example"], "rows": [["a vowel", "+ ㅂ니다", "가다 -> 갑니다"], ["a consonant", "+ 습니다", "먹다 -> 먹습니다"], ["하다 verbs", "-> 합니다", "공부하다 -> 공부합니다"]]}, {"type": "tip", "text": "Why does Korean bother having two present tenses? 해요체 (yo-form) is what you'd use with a friend, a classmate, or a stranger you're being politely casual with. 합니다체 (formal form) is for job interviews, TV news, military contexts, or addressing a room of strangers formally. Neither one is 'more correct' - they're two different social registers, and we'll dig into the nuance properly in the Speech Levels course. For now, just recognize both and know when you're hearing which."}, {"type": "sentence-list", "items": [{"kr": "저는 학생입니다.", "rom": "jeoneun haksaeng-imnida.", "eng": "I am a student. (formal)"}, {"kr": "한국어를 공부합니다.", "rom": "hangugeoleul gongbuhamnida.", "eng": "I study Korean. (formal)"}, {"kr": "매일 아침에 뉴스를 봅니다.", "rom": "maeil achim-e nyuseureul bomnida.", "eng": "I watch the news every morning. (formal)"}, {"kr": "이 회사에서 일합니다.", "rom": "i hoesa-eseo ilhamnida.", "eng": "I work at this company. (formal)"}]}, {"type": "fun", "text": "Turn on any Korean news broadcast and you'll hear 습니다/ㅂ니다 in nearly every sentence - it's the instantly recognizable 'sound' of formal, authoritative Korean speech, the way a certain clipped cadence signals 'news anchor' in English too."}], "quiz": [{"q": "가다's stem 가- ends in a vowel. What's the formal present form?", "options": ["가습니다", "갑니다", "가읍니다", "가ㅂ니다 said separately"], "correct": 1, "explain": "Vowel-ending stems take ㅂ니다: 가 + ㅂ니다 = 갑니다."}, {"q": "먹다's stem 먹- ends in a consonant. What's the formal present form?", "options": ["먹ㅂ니다", "먹습니다", "먹니다", "먹어니다"], "correct": 1, "explain": "Consonant-ending stems take 습니다: 먹 + 습니다 = 먹습니다."}, {"q": "Where would you most expect to hear -습니다/-ㅂ니다 rather than -아요/어요?", "options": ["Chatting casually with a close friend", "A TV news broadcast", "Texting a classmate", "Talking to a younger sibling"], "correct": 1, "explain": "습니다체 is the formal register - news broadcasts, presentations, and other formal contexts reach for it."}, {"q": "공부하다's formal present form is:", "options": ["공부해습니다", "공부합니다", "공부하ㅂ니다", "공부습니다"], "correct": 1, "explain": "하다 verbs become 합니다 in the formal present, just like they become 해요 in the polite-informal present."}]}, {"id": "u4", "num": 4, "group": "Past Tense", "title": "Past Tense: -Assoyo/Eossoyo", "kr": "과거형: 았/었어요", "intro": "Same vowel-harmony logic you already mastered - just swap in 았/었 instead of 아/어, and add a syllable. If Unit 1 clicked for you, this unit will feel almost too easy.", "body": [{"type": "p", "text": "The rule is identical to present tense, just with an extra syllable: bright-vowel stems (a/o) take <span class=\"kr\">았어요</span>, everything else takes <span class=\"kr\">었어요</span>, and 하다 verbs become <span class=\"kr\">했어요</span>."}, {"type": "p", "text": "수민's first day at her new cafe job did not go smoothly."}, {"type": "dialogue", "items": [{"speaker": "수민", "kr": "어제 카페에서 일했어요.", "rom": "eoje kape-eseo ilhaesseoyo.", "eng": "Yesterday I worked at the cafe."}, {"speaker": "수민", "kr": "커피를 쏟았어요.", "rom": "keopireul ssodasseoyo.", "eng": "I spilled the coffee."}, {"speaker": "수민", "kr": "사장님이 웃었어요.", "rom": "sajangnim-i useosseoyo.", "eng": "My boss laughed."}, {"speaker": "수민", "kr": "그래도 재미있었어요!", "rom": "geuraedo jaemiisseosseoyo!", "eng": "Even so, it was fun!"}]}, {"type": "table", "headers": ["Rule", "Example", "Meaning"], "rows": [["a/o stem + 았어요", "가다 -> 갔어요", "went"], ["other stem + 었어요", "먹다 -> 먹었어요", "ate"], ["하다 verbs -> 했어요", "일하다 -> 일했어요", "worked"]]}, {"type": "tip", "text": "Just like 가다 -> 가 in the present, 가다's past tense 가 + 았어요 merges to 갔어요, not 가았어요. The same vowel-collapsing habit shows up here too - it's a pattern, not an exception you need to memorize case-by-case."}, {"type": "fun", "text": "Time words are your best friend for practicing past tense naturally: 어제 (yesterday), 지난주 (last week), 아까 (a little while ago), 작년 (last year). Anchor a new sentence to one of these and the past tense almost writes itself."}], "quiz": [{"q": "What's the past-tense version of 먹어요 (eats)?", "options": ["먹았어요", "먹었어요", "먹해요", "먹어었요"], "correct": 1, "explain": "먹다's stem 먹- takes 었어요 in the past, same 'dark vowel' logic as the present tense: 먹었어요."}, {"q": "가다 (to go) in the past tense is:", "options": ["가았어요", "갔어요", "가어요", "가했어요"], "correct": 1, "explain": "가 + 았어요 merges to 갔어요 - the same vowel-collapsing pattern you saw in the present tense."}, {"q": "수민 says '커피를 쏟았어요.' What happened?", "options": ["She drank the coffee", "She spilled the coffee", "She made the coffee", "She bought coffee"], "correct": 1, "explain": "쏟다 means 'to spill' - 쏟았어요 is its past tense: 'spilled.'"}, {"q": "Which word would you add to a sentence to clearly signal 'last week'?", "options": ["내일", "지난주", "다음 달", "오늘"], "correct": 1, "explain": "지난주 means 'last week' - a natural anchor for past-tense sentences."}]}, {"id": "u5", "num": 5, "group": "Future Tense", "title": "Future Tense: -(eu)l Geoyeyo vs. -Gesseoyo", "kr": "미래형: (으)ㄹ 거예요 / 겠어요", "intro": "Korean has two futures, and they're not interchangeable - mixing them up is one of the most common mistakes intermediate learners make. This unit exists to make sure you never make it.", "body": [{"type": "p", "text": "<span class=\"kr\">-(으)ㄹ 거예요</span> is for plans, intentions, and predictions based on what you already know. If the stem ends in a vowel, add <span class=\"kr\">ㄹ 거예요</span>; if it ends in a consonant, add <span class=\"kr\">을 거예요</span>."}, {"type": "table", "headers": ["Stem ends in...", "Rule", "Example"], "rows": [["a vowel", "+ ㄹ 거예요", "가다 -> 갈 거예요 (will go)"], ["a consonant", "+ 을 거예요", "먹다 -> 먹을 거예요 (will eat)"]]}, {"type": "p", "text": "<span class=\"kr\">-겠어요</span> attaches straight to the stem and is used for in-the-moment guesses, promises, or predictions based on what you're observing right now - often something you couldn't have planned."}, {"type": "dialogue", "items": [{"speaker": "제이슨", "kr": "이번 주말에 부산에 갈 거예요.", "rom": "ibeon jumal-e busan-e gal geoyeyo.", "eng": "I'm going to Busan this weekend. (a made plan)"}, {"speaker": "제이슨", "kr": "하늘을 봐요. 비가 오겠어요.", "rom": "haneul-eul bwayo. biga ogesseoyo.", "eng": "Look at the sky. It's going to rain. (an in-the-moment guess)"}, {"speaker": "수민", "kr": "제가 도와드리겠습니다.", "rom": "jega dowadeurigetseumnida.", "eng": "I will help you. (a promise, formal)"}]}, {"type": "tip", "text": "Quick test: if you could have said the sentence yesterday because you'd already decided it, use 거예요. If the sentence only makes sense because of something you're seeing/feeling right this second, use 겠어요."}, {"type": "fun", "text": "겠어요 also shows up in a set phrase every Korean learner hears constantly: 잘 먹겠습니다 ('I will eat well'), said before a meal - it's less a literal future prediction and more a fixed expression of gratitude, similar in spirit to 'bon appetit' said by the person about to eat."}], "quiz": [{"q": "수민 already decided last week that she's visiting Busan this weekend. Which form fits?", "options": ["부산에 가겠어요", "부산에 갈 거예요", "부산에 가요만", "부산에 갔어요"], "correct": 1, "explain": "A pre-made plan calls for -(으)ㄹ 거예요, not the in-the-moment 겠어요."}, {"q": "You look up, see dark clouds, and guess out loud. Which form fits?", "options": ["비가 올 거예요, calmly planned days ago", "비가 오겠어요, based on what you see now", "비가 왔어요", "비가 오습니다"], "correct": 1, "explain": "An in-the-moment observation/guess calls for -겠어요."}, {"q": "먹다's plan-future form ('will eat') is:", "options": ["먹을 거예요", "먹겠어요 only", "먹거예요", "먹르 거예요"], "correct": 0, "explain": "먹다's stem ends in a consonant, so it takes 을 거예요: 먹을 거예요."}, {"q": "What does 잘 먹겠습니다 actually function as in everyday use?", "options": ["A literal weather forecast", "A fixed phrase said before eating, like 'bon appetit'", "A formal complaint", "A question"], "correct": 1, "explain": "It's a set expression said before a meal - closer to a polite ritual phrase than a literal future-tense prediction."}]}, {"id": "u6", "num": 6, "group": "Negation", "title": "Negation I: An + Verb", "kr": "부정문 I: 안", "intro": "Time to say what didn't, doesn't, or won't happen. This is the negation form you'll reach for first - short, simple, and used constantly in daily conversation.", "body": [{"type": "p", "text": "Put <span class=\"kr\">안</span> directly in front of any conjugated verb to negate it. That's the entire rule for this unit: <strong>안 + [conjugated verb]</strong>."}, {"type": "dialogue", "items": [{"speaker": "제이슨", "kr": "저는 커피를 안 마셔요.", "rom": "jeoneun keopireul an masyeoyo.", "eng": "I don't drink coffee."}, {"speaker": "제이슨", "kr": "오늘 학교에 안 가요.", "rom": "oneul hakgyo-e an gayo.", "eng": "I'm not going to school today."}, {"speaker": "제이슨", "kr": "어제 숙제를 안 했어요.", "rom": "eoje sukjereul an haesseoyo.", "eng": "I didn't do homework yesterday."}]}, {"type": "warn", "text": "There's one small trap with 하다 verbs: 안 goes between the noun and 하다, not in front of the whole word. So it's 공부 안 해요 (not 안 공부해요), and 숙제를 안 해요 (not 안 숙제해요). Native speakers say it this way instinctively - it just takes a bit of ear-training for learners."}, {"type": "tip", "text": "안 is casual and conversational - it's the negation you'll hear far more often in spoken Korean than the longer form coming up in the next unit. Think of it as the everyday, unmarked way to say 'not.'"}, {"type": "sentence-list", "items": [{"kr": "안 가요", "rom": "an gayo", "eng": "don't/doesn't go"}, {"kr": "안 먹어요", "rom": "an meogeoyo", "eng": "don't/doesn't eat"}, {"kr": "공부 안 해요", "rom": "gongbu an haeyo", "eng": "don't/doesn't study"}, {"kr": "안 갔어요", "rom": "an gasseoyo", "eng": "didn't go"}, {"kr": "안 예뻐요", "rom": "an yeppeoyo", "eng": "not pretty"}]}], "quiz": [{"q": "Where does 안 go relative to the verb?", "options": ["After the verb", "Directly in front of the conjugated verb", "At the very end of the sentence", "Attached to the subject"], "correct": 1, "explain": "안 is placed directly before the conjugated verb: 안 가요, 안 먹어요."}, {"q": "How do you correctly negate 공부해요 (studies) with 안?", "options": ["안 공부해요", "공부 안 해요", "공부해 안 요", "안공부 해요"], "correct": 1, "explain": "With 하다 verbs, 안 slots between the noun and 하다: 공부 안 해요, not 안 공부해요."}, {"q": "제이슨 says '저는 커피를 안 마셔요.' What does he mean?", "options": ["I drink coffee often", "I don't drink coffee", "I drank coffee yesterday", "I will drink coffee"], "correct": 1, "explain": "안 마셔요 = 'don't drink' - a simple negation of 마셔요."}, {"q": "Which register is 안 negation most associated with?", "options": ["Only formal writing", "Casual, everyday spoken Korean", "Only news broadcasts", "Only written contracts"], "correct": 1, "explain": "안 is the everyday, conversational way to negate a verb - extremely common in spoken Korean."}]}, {"id": "u7", "num": 7, "group": "Negation", "title": "Negation II: -ji Anta & Mot / -ji Mothada", "kr": "부정문 II: 지 않다 / 못", "intro": "Two more negation tools: a longer, slightly more formal-feeling 'not,' and a completely different idea - 'can't,' where the reason is ability or circumstance, not choice.", "body": [{"type": "p", "text": "<span class=\"kr\">-지 않다</span> attaches straight onto the verb stem and means the same thing as 안 - 'doesn't/didn't' - but carries a slightly more formal, deliberate feel, and is very common in writing."}, {"type": "table", "headers": ["Form", "Example", "Meaning"], "rows": [["stem + 지 않아요", "가다 -> 가지 않아요", "don't/doesn't go"], ["stem + 지 않았어요", "먹다 -> 먹지 않았어요", "didn't eat"]]}, {"type": "p", "text": "<span class=\"kr\">못</span> is a completely different kind of negative: it means <strong>can't</strong> - not by choice, but because something prevents you. Just like 안, it goes directly in front of the verb: <strong>못 + verb</strong>. There's also a longer form, <span class=\"kr\">-지 못하다</span>, which attaches to the stem the same way 지 않다 does."}, {"type": "dialogue", "items": [{"speaker": "제이슨", "kr": "어제 아파서 학교에 못 갔어요.", "rom": "eoje apaseo hakgyo-e mot gasseoyo.", "eng": "I couldn't go to school yesterday because I was sick."}, {"speaker": "수민", "kr": "매워서 이 음식을 먹지 못해요.", "rom": "maewoseo i eumsigeul meokji mothaeyo.", "eng": "I can't eat this food because it's spicy."}]}, {"type": "fun", "text": "This distinction between 안 (didn't, by choice) and 못 (couldn't, by circumstance) shows up in how Koreans talk about missing meals: saying '못 먹었어요' for a skipped meal frames it as something that happened to you - you weren't able to eat - rather than '안 먹었어요,' which suggests you simply chose not to. It's a small window into how the language separates intention from ability."}, {"type": "tip", "text": "Quick test: if the sentence is really about capability, obstacles, or circumstance ('I can't because...'), reach for 못. If it's simply the opposite of doing something ('I don't/didn't'), 안 or 지 않다 both work fine."}], "quiz": [{"q": "가다's -지 않다 present-tense negative is:", "options": ["가지 않아요", "안 가다요", "가않아요", "가지 안다"], "correct": 0, "explain": "-지 않다 attaches to the stem: 가지 않아요, meaning 'don't/doesn't go.'"}, {"q": "What does 못 fundamentally express, that 안 doesn't?", "options": ["Simple negation with no nuance", "Inability/circumstance - 'can't,' not 'don't choose to'", "Formality only", "Past tense only"], "correct": 1, "explain": "못 specifically frames the negative as being outside your control - inability rather than choice."}, {"q": "제이슨 says '아파서 학교에 못 갔어요.' Why didn't he go?", "options": ["He didn't want to", "He was sick, so he couldn't", "He forgot", "He went somewhere else instead"], "correct": 1, "explain": "못 갔어요 = 'couldn't go' - combined with 아파서 ('because sick'), it explains the inability."}, {"q": "Which sentence uses the longer, 'can't' form correctly?", "options": ["매워서 이 음식을 먹지 못해요", "매워서 이 음식을 안지 못해요", "매워서 이 음식을 못지 않아요", "매워서 이 음식을 먹않지 못해요"], "correct": 0, "explain": "-지 못하다 attaches to the stem 먹-: 먹지 못해요, meaning 'can't eat.'"}]}, {"id": "u8", "num": 8, "group": "Irregular Verbs", "title": "Irregular Verbs I: B and D Irregulars", "kr": "불규칙 활용 I: ㅂ, ㄷ", "intro": "Every language has its exceptions - the verbs that don't follow the rules you just spent seven units mastering. Good news: Korean's irregulars follow their own smaller set of rules, so once you learn the pattern, you're not memorizing case by case.", "body": [{"type": "p", "text": "<strong>B irregulars:</strong> some verbs whose stem ends in ㅂ swap that ㅂ for 우 before adding an ending - the ㅂ essentially 'melts' into the vowel."}, {"type": "table", "headers": ["Dictionary form", "What happens", "Present tense"], "rows": [["덥다 (to be hot)", "ㅂ -> 우, then + 어요", "더워요"], ["춥다 (to be cold)", "ㅂ -> 우, then + 어요", "추워요"], ["어렵다 (to be difficult)", "ㅂ -> 우, then + 어요", "어려워요"], ["돕다 (to help) - exception", "ㅂ -> 오, then + 아요", "도와요"]]}, {"type": "warn", "text": "돕다 (to help) and 곱다 (to be pretty/fine) are the two well-known exceptions inside the exception: instead of becoming 우, their ㅂ becomes 오, so 돕다 -> 도와요, not 도워요. Everything else follows the 우 pattern above."}, {"type": "p", "text": "<strong>D irregulars:</strong> some verbs whose stem ends in ㄷ swap that ㄷ for ㄹ before adding a vowel-starting ending."}, {"type": "table", "headers": ["Dictionary form", "What happens", "Present tense"], "rows": [["듣다 (to listen/hear)", "ㄷ -> ㄹ, then + 어요", "들어요"], ["걷다 (to walk)", "ㄷ -> ㄹ, then + 어요", "걸어요"], ["묻다 (to ask)", "ㄷ -> ㄹ, then + 어요", "물어요"]]}, {"type": "tip", "text": "Not every verb ending in ㅂ or ㄷ is irregular - 입다 (to wear) is perfectly regular (입어요), and 받다 (to receive) is also regular (받아요). There's no single visual shortcut for spotting which ones are irregular; it comes down to memorizing this specific, fairly short list as you meet each verb."}, {"type": "fun", "text": "수민's grandmother always says 잘 들어요 ('listen carefully') before giving advice - 듣다 -> 들어요 is one of the very first D-irregulars most learners memorize, precisely because it comes up in so many everyday phrases about paying attention."}], "quiz": [{"q": "덥다 (to be hot) in the present tense is:", "options": ["덥어요", "더버요", "더워요", "덥아요"], "correct": 2, "explain": "B irregular: 덥- swaps ㅂ for 우, then adds 어요 -> 더워요."}, {"q": "돕다 (to help) is the exception to the exception. Its present tense is:", "options": ["도와요", "도워요", "돕어요", "돕아요"], "correct": 0, "explain": "돕다 and 곱다 uniquely turn their ㅂ into 오 (not 우): 돕다 -> 도와요."}, {"q": "듣다 (to listen) in the present tense is:", "options": ["듣어요", "들어요", "드러요", "듣아요"], "correct": 1, "explain": "D irregular: 듣- swaps ㄷ for ㄹ, then adds 어요 -> 들어요."}, {"q": "Is 입다 (to wear) a B irregular?", "options": ["Yes, it becomes 이워요", "No - it's regular: 입어요", "Yes, it becomes 이봐요", "No - it's a 하다 verb"], "correct": 1, "explain": "입다 is fully regular: 입 + 어요 = 입어요, no irregularity despite ending in ㅂ."}]}, {"id": "u9", "num": 9, "group": "Irregular Verbs", "title": "Irregular Verbs II: Reu, S, and H Irregulars", "kr": "불규칙 활용 II: 르, ㅅ, ㅎ", "intro": "The three irregular patterns learners find trickiest - but each has a clean, learnable mechanic. This is the unit where 'confident with conjugation' really starts to mean something.", "body": [{"type": "p", "text": "<strong>REU irregulars:</strong> when a stem ends in 르, the 으 drops and an extra ㄹ is added onto the syllable before it - the ㄹ effectively doubles up."}, {"type": "table", "headers": ["Dictionary form", "What happens", "Present tense"], "rows": [["모르다 (to not know)", "으 drops, ㄹ doubles", "몰라요"], ["빠르다 (to be fast)", "으 drops, ㄹ doubles", "빨라요"], ["다르다 (to be different)", "으 drops, ㄹ doubles", "달라요"]]}, {"type": "p", "text": "<strong>S irregulars:</strong> some verbs whose stem ends in ㅅ simply drop that ㅅ entirely before a vowel-starting ending."}, {"type": "table", "headers": ["Dictionary form", "What happens", "Present tense"], "rows": [["짓다 (to build)", "ㅅ disappears", "지어요"], ["낫다 (to get better/heal)", "ㅅ disappears", "나아요"]]}, {"type": "warn", "text": "Not all ㅅ-ending verbs drop the ㅅ - 웃다 (to laugh) and 벗다 (to take off) are completely regular: 웃어요, 벗어요. As with the ㅂ/ㄷ irregulars, this comes down to a specific list rather than a universal visual rule."}, {"type": "p", "text": "<strong>H irregulars:</strong> these show up almost entirely in color and descriptive words. The stem's final ㅎ drops, and the vowel often shifts, most commonly to 애 or 얘."}, {"type": "table", "headers": ["Dictionary form", "What happens", "Present tense"], "rows": [["그렇다 (to be like that)", "ㅎ drops, vowel -> 애", "그래요"], ["빨갛다 (to be red)", "ㅎ drops, vowel -> 애", "빨개요"], ["하얗다 (to be white)", "ㅎ drops, vowel -> 얘", "하얘요"]]}, {"type": "tip", "text": "좋다 (to be good) looks like it should be an H irregular but isn't - it's perfectly regular: 좋아요. The H irregular pattern is really about a specific family of descriptive/color words, not every H-ending word."}, {"type": "fun", "text": "제이슨 mixes up 몰라요 and 모라요 constantly when he's speaking fast - it's the single most common irregular-verb slip among learners, precisely because 모르다 is such a high-frequency verb (used for 'I don't know' constantly) that there's no time to pause and think through the rule mid-sentence."}], "quiz": [{"q": "모르다 (to not know) in the present tense is:", "options": ["모러요", "몰라요", "모라요", "모르요"], "correct": 1, "explain": "REU irregular: the 으 drops and ㄹ doubles onto the previous syllable -> 몰라요."}, {"q": "짓다 (to build) in the present tense is:", "options": ["짓어요", "지서요", "지어요", "짓아요"], "correct": 2, "explain": "S irregular: the ㅅ disappears before the vowel-starting ending -> 지어요."}, {"q": "웃다 (to laugh) - is it also an S irregular that drops its S?", "options": ["Yes, becomes 우어요", "No - it's regular: 웃어요", "Yes, becomes 우서요", "No - it's a 하다 verb"], "correct": 1, "explain": "웃다 is a regular verb despite ending in ㅅ: 웃 + 어요 = 웃어요."}, {"q": "빨갛다 (to be red) in the present tense is:", "options": ["빨가요", "빨갛어요", "빨개요", "빨하요"], "correct": 2, "explain": "H irregular: the ㅎ drops and the vowel shifts to 애 -> 빨개요."}]}, {"id": "u10", "num": 10, "group": "Putting It Together", "title": "Combining Everything: Tense + Negation", "kr": "종합: 시제 + 부정문", "intro": "You've learned every piece separately. Now we stack them - past negative, future negative, formal past - the exact combinations you'll actually need when you speak in full, real sentences.", "body": [{"type": "p", "text": "Combining tense and negation is mostly just layering what you already know. With 안, the tense conjugation happens on the verb exactly as normal - 안 just sits in front of it. With -지 않다/-지 못하다, the tense goes on 않다/못하다 itself, since that's now the 'verb' at the end of the phrase."}, {"type": "table", "headers": ["Meaning", "With 안", "With -지 않다"], "rows": [["don't/doesn't go", "안 가요", "가지 않아요"], ["didn't go", "안 갔어요", "가지 않았어요"], ["won't go / not going to go", "안 갈 거예요", "가지 않을 거예요"], ["can't go", "못 가요", "가지 못해요"], ["couldn't go", "못 갔어요", "가지 못했어요"]]}, {"type": "p", "text": "수민 and 제이슨 are planning a weekend trip, working through what happened, what didn't, and what they will and won't do."}, {"type": "dialogue", "items": [{"speaker": "제이슨", "kr": "지난주에 표를 못 샀어요.", "rom": "jinanjue pyoreul mot sasseoyo.", "eng": "Last week I couldn't buy the tickets."}, {"speaker": "수민", "kr": "괜찮아요. 이번 주말에는 갈 거예요.", "rom": "gwaenchanayo. ibeon jumal-eneun gal geoyeyo.", "eng": "That's fine. We're going this weekend."}, {"speaker": "제이슨", "kr": "저는 늦잠을 안 잘 거예요.", "rom": "jeoneun neutjameul an jal geoyeyo.", "eng": "I won't oversleep."}, {"speaker": "수민", "kr": "저도 이번에는 지각하지 않을 거예요.", "rom": "jeodo ibeon-eneun jigakhaji anh-eul geoyeyo.", "eng": "I won't be late this time either."}]}, {"type": "tip", "text": "When you're not sure which negation form fits a sentence you're building, default to 안/못 for spoken Korean - they're shorter, more common, and never sound stiff. Save -지 않다/-지 못하다 for writing or more formal speech."}], "quiz": [{"q": "How do you say 'didn't go' using 안?", "options": ["안 가요", "안 갔어요", "안 갈 거예요", "가지 안다"], "correct": 1, "explain": "The past tense conjugation happens on the verb itself: 안 갔어요 (안 + 가다's past tense)."}, {"q": "How do you say 'won't go' using -지 않다?", "options": ["가지 않아요", "가지 않았어요", "가지 않을 거예요", "안 갈 거지 않아요"], "correct": 2, "explain": "With -지 않다, the future goes on 않다 itself: 가지 않을 거예요."}, {"q": "제이슨 says '지난주에 표를 못 샀어요.' What couldn't he do?", "options": ["Sell the tickets", "Buy the tickets", "Find the tickets", "Return the tickets"], "correct": 1, "explain": "못 샀어요 = 'couldn't buy' (샀어요 is 사다's past tense) - he wasn't able to buy the tickets."}, {"q": "Which register is 안/못 generally better suited for?", "options": ["Formal writing only", "Everyday spoken Korean", "Legal documents", "News broadcasts exclusively"], "correct": 1, "explain": "안/못 are shorter and more natural in spoken Korean; -지 않다/-지 못하다 lean more formal/written."}]}, {"id": "u11", "num": 11, "group": "Capstone", "title": "Real Conversations", "kr": "실전 회화", "intro": "Three full dialogues using everything from this course - present, past, future, and negation, woven together the way real conversations actually sound. This is where it all clicks into place.", "body": [{"type": "p", "text": "<strong>Scene 1 - At the cafe, where 수민 works.</strong>"}, {"type": "dialogue", "items": [{"speaker": "손님", "kr": "아메리카노 한 잔 주세요.", "rom": "amerikano han jan juseyo.", "eng": "One Americano, please."}, {"speaker": "수민", "kr": "네, 잠시만 기다리세요. 오늘 좀 바빠서 조금 걸릴 거예요.", "rom": "ne, jamsiman gidariseyo. oneul jom bappaseo jogeum geollil geoyeyo.", "eng": "Yes, please wait a moment. It's a bit busy today, so it'll take a little while."}, {"speaker": "손님", "kr": "괜찮아요. 안 급해요.", "rom": "gwaenchanayo. an geuphaeyo.", "eng": "That's fine. I'm not in a hurry."}]}, {"type": "p", "text": "<strong>Scene 2 - 제이슨 texting a friend after class.</strong>"}, {"type": "dialogue", "items": [{"speaker": "제이슨", "kr": "오늘 수업 끝났어요. 저녁에 시간 있어요?", "rom": "oneul sueop kkeutnasseoyo. jeonyeoge sigan isseoyo?", "eng": "Class ended today. Do you have time this evening?"}, {"speaker": "친구", "kr": "미안해요, 오늘은 못 만나요. 숙제가 너무 많아요.", "rom": "mianhaeyo, oneureun mot mannayo. sukjega neomu manhayo.", "eng": "Sorry, I can't meet today. I have too much homework."}, {"speaker": "제이슨", "kr": "알겠어요. 그럼 다음 주에 만날까요?", "rom": "algesseoyo. geureom da-eum ju-e mannalkkayo?", "eng": "Got it. Then shall we meet next week?"}]}, {"type": "p", "text": "<strong>Scene 3 - 수민 meeting her professor.</strong>"}, {"type": "dialogue", "items": [{"speaker": "교수님", "kr": "수민 씨, 과제는 다 했습니까?", "rom": "sumin ssi, gwajeneun da haetseumnikka?", "eng": "Sumin, have you finished the assignment?"}, {"speaker": "수민", "kr": "거의 다 했습니다. 내일까지 제출하겠습니다.", "rom": "geoui da haetseumnida. naeilkkaji jechulhagetseumnida.", "eng": "I've almost finished it. I will submit it by tomorrow."}, {"speaker": "교수님", "kr": "좋습니다. 늦지 않게 부탁합니다.", "rom": "jotseumnida. neutji anhge butakhamnida.", "eng": "Good. Please don't be late."}]}, {"type": "warn", "text": "Spot the register shift in Scene 3: the professor and student use -습니다/-ㅂ니다 with each other because it's a formal academic context, while Scene 2 between friends uses -아요/어요 throughout. Same tenses, different social register - a preview of what the next course in this series, Speech Levels & Politeness, covers in full."}], "quiz": [{"q": "In Scene 3, why do 수민 and her professor use -습니다/-ㅂ니다 instead of -아요/어요?", "options": ["Because it's grammatically required by the tense", "Because of the formal academic social context", "Because they're talking about the past", "There's no real reason, it's random"], "correct": 1, "explain": "The formal register is chosen for social context (student-professor), not because of the tense being used."}, {"q": "In Scene 2, why can't the friend meet 제이슨 today?", "options": ["They're sick", "They have too much homework", "They're out of town", "They don't want to see him"], "correct": 1, "explain": "숙제가 너무 많아요 - 'I have too much homework' - is the stated reason."}, {"q": "수민 tells her professor '내일까지 제출하겠습니다.' What is she committing to?", "options": ["Submitting it right now", "Submitting it by tomorrow", "Never submitting it", "Asking for an extension"], "correct": 1, "explain": "내일까지 제출하겠습니다 = 'I will submit it by tomorrow' - a promise using -겠습니다."}, {"q": "What's the overall theme connecting all three scenes?", "options": ["Talking about the weather", "Everyday tense and negation used naturally across different social registers", "Only past-tense storytelling", "Formal writing only"], "correct": 1, "explain": "All three scenes use the tenses and negation from this course, naturally, across a range of everyday and formal contexts."}]}];

/* ============================================================
   2. STATE
   ============================================================ */
const State = {
  theme: localStorage.getItem('kv_theme') || 'dark',
  fontScale: parseFloat(localStorage.getItem('kv_font')||'1'),
  completed: JSON.parse(localStorage.getItem('kv_completed')||'{}'),
  xp: parseInt(localStorage.getItem('kv_xp')||'0'),
  badges: JSON.parse(localStorage.getItem('kv_badges')||'{}'),
  notes: JSON.parse(localStorage.getItem('kv_notes')||'{}'),
  bookmarks: JSON.parse(localStorage.getItem('kv_bookmarks')||'{}'),
  mistakes: JSON.parse(localStorage.getItem('kv_mistakes')||'{}'),
  streak: parseInt(localStorage.getItem('kv_streak')||'0'),
  bestStreak: parseInt(localStorage.getItem('kv_beststreak')||'0'),
  last: localStorage.getItem('kv_last') || 'cover',
  current: null,
  name: localStorage.getItem('kv_name') || '',
};
function saveState(){
  localStorage.setItem('kv_theme', State.theme);
  localStorage.setItem('kv_font', State.fontScale);
  localStorage.setItem('kv_completed', JSON.stringify(State.completed));
  localStorage.setItem('kv_xp', State.xp);
  localStorage.setItem('kv_badges', JSON.stringify(State.badges));
  localStorage.setItem('kv_notes', JSON.stringify(State.notes));
  localStorage.setItem('kv_bookmarks', JSON.stringify(State.bookmarks));
  localStorage.setItem('kv_mistakes', JSON.stringify(State.mistakes));
  localStorage.setItem('kv_streak', State.streak);
  localStorage.setItem('kv_beststreak', State.bestStreak);
  localStorage.setItem('kv_last', State.current);
  localStorage.setItem('kv_name', State.name);
}
function addXP(n){ State.xp += n; saveState(); updateProgressUI(); }
function markComplete(id){
  if(!State.completed[id]){ State.completed[id]=true; addXP(10); checkBadges(); }
  saveState(); updateProgressUI();
}
function registerAnswer(key, correct){
  const cur = State.mistakes[key]||0;
  State.mistakes[key] = correct ? Math.min(3, cur+1) : 0;
  saveState();
}
function gradeAnswer(key, correct, xp){
  registerAnswer(key, correct);
  if(correct){
    State.streak++;
    if(State.streak > State.bestStreak) State.bestStreak = State.streak;
    addXP(xp||5);
  } else {
    State.streak = 0;
    saveState(); updateProgressUI();
  }
  checkBadges();
}

const BADGE_DEFS = [
 {id:'first', icon:'🌱', name:'First Step', test:()=>Object.keys(State.completed).length>=1},
 {id:'stem', icon:'📐', name:'Stem Master', test:()=>State.completed['u1']},
 {id:'present', icon:'☀️', name:'Present Perfected', test:()=>State.completed['u2']&&State.completed['u3']},
 {id:'past', icon:'⏪', name:'Past Master', test:()=>State.completed['u4']},
 {id:'future', icon:'🔮', name:'Future Forecaster', test:()=>State.completed['u5']},
 {id:'negation', icon:'🚫', name:'Negation Novice', test:()=>State.completed['u6']&&State.completed['u7']},
 {id:'irregular', icon:'🌀', name:'Irregular Slayer', test:()=>State.completed['u8']&&State.completed['u9']},
 {id:'combiner', icon:'🧩', name:'Combiner', test:()=>State.completed['u10']},
 {id:'conversationalist', icon:'🎭', name:'Real Conversationalist', test:()=>State.completed['u11']},
 {id:'onfire', icon:'🔥', name:'On Fire', test:()=>State.bestStreak>=10},
 {id:'graduate', icon:'🎓', name:'Verb Master', test:()=>State.completed['finalexam']},
];
function checkBadges(){
  BADGE_DEFS.forEach(b=>{ if(!State.badges[b.id] && b.test()){ State.badges[b.id]=true; } });
  saveState();
}

/* ============================================================
   3. AUDIO — pre-recorded clips (base64 data URIs) looked up by
      exact Korean text, matching the Hookitlingo audio system
   ============================================================ */
const Audio_ = {
  queue: [], playing: false, currentAudio: null, ready: true,
  sanitize(text) { return text.replace(/[\\/:*?"<>|]/g, ''); },
  lookup(text) {
    const clean = this.sanitize(text).trim();
    const candidates = [text, clean, clean + '.', clean + ' '];
    for (const c of candidates) {
      if (Object.prototype.hasOwnProperty.call(AUDIO_DATA, c)) return AUDIO_DATA[c];
    }
    return null;
  },
  speak(text, btn) {
    if (!text) return;
    if (btn) { if (btn.dataset.busy === '1') return; btn.dataset.busy = '1'; btn.classList.add('loading'); }
    this.queue.push({ text, btn });
    this._pump();
  },
  _pump() {
    if (this.playing || !this.queue.length) return;
    const { text, btn } = this.queue.shift();
    this.playing = true;
    const dataUri = this.lookup(text);
    if (btn) { btn.classList.remove('loading'); btn.classList.add('playing'); }
    const done = () => {
      this.playing = false; this.currentAudio = null;
      if (btn) { btn.classList.remove('playing'); btn.dataset.busy = '0'; }
      setTimeout(() => this._pump(), 120);
    };
    if (!dataUri) {
      if (btn) { const orig = btn.innerHTML; btn.innerHTML = '❌ Missing'; setTimeout(() => btn.innerHTML = orig, 1500); }
      done(); return;
    }
    const audio = new Audio();
    this.currentAudio = audio;
    audio.onended = done;
    audio.onerror = () => { if (btn) { const orig = btn.innerHTML; btn.innerHTML = '❌ Missing'; setTimeout(() => btn.innerHTML = orig, 1500); } done(); };
    audio.addEventListener('canplaythrough', () => { audio.play().catch(() => done()); }, { once: true });
    audio.src = dataUri;
    audio.load();
  },
  stop() { if (this.currentAudio) { this.currentAudio.pause(); this.currentAudio = null; } this.playing = false; this.queue = []; }
};
function spkBtn(text, label){
  label = label || '🔊 Listen';
  if (!text) return '';
  const safeText = JSON.stringify(text).replace(/"/g, '&quot;');
  return `<button class="spk-btn no-print" onclick="Audio_.speak(${safeText}, this)">${label}</button>`;
}

/* ============================================================
   4. NAV / SIDEBAR / TOPBAR
   ============================================================ */
function buildSidebar(){
  const nav = document.getElementById('navList');
  let html=''; let lastGroup=null;
  CHAPTERS.forEach(c=>{
    if(c.group!==lastGroup){ html+=`<div class="nav-group-label">${c.group}</div>`; lastGroup=c.group; }
    html+=`<button class="nav-item" data-id="${c.id}" onclick="goTo('${c.id}')"><span class="dot"></span><span class="lbl">${c.title}</span></button>`;
    if(c.id==='finalexam'){
      html+=`<button class="nav-item nav-item-support" data-id="support" onclick="openSupportScreen()"><span class="dot"></span><span class="lbl">💛 Support</span></button>`;
    }
  });
  nav.innerHTML = html;
}
function updateProgressUI(){
  const total = CHAPTERS.length;
  const done = Object.keys(State.completed).length;
  const pct = Math.round((done/total)*100);
  document.getElementById('sideBar').style.width = pct+'%';
  document.getElementById('pctLabel').textContent = pct+'% • '+State.xp+' XP';
  document.getElementById('streakLabel').textContent = State.streak + (State.bestStreak ? ` (best ${State.bestStreak})` : '');
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('done', !!State.completed[el.dataset.id]);
    el.classList.toggle('active', el.dataset.id===State.current);
  });
}
function goTo(id){
  const chap = CHAPTERS.find(c=>c.id===id);
  if(!chap) return;
  State.current = id; saveState();
  const main = document.getElementById('main');
  main.innerHTML = '';
  const section = document.createElement('div');
  section.className='chapter active';
  section.id='chap-'+id;
  main.appendChild(section);
  chap.render(section);
  updateProgressUI();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlayBg').classList.remove('show');
  window.scrollTo(0,0);
  main.scrollTop = 0;
  if(!['cover'].includes(id)){
    clearTimeout(window._completeTimer);
    window._completeTimer = setTimeout(()=>markComplete(id), 4000);
  }
}
function updateReadbar(){
  const main = document.getElementById('main');
  const scrollable = main.scrollHeight - window.innerHeight;
  const pct = scrollable>0 ? Math.min(100, Math.max(0,(window.scrollY/scrollable)*100)) : 0;
  document.getElementById('readbarFill').style.width = pct+'%';
}
window.addEventListener('scroll', updateReadbar);
function applyTheme(){
  document.documentElement.setAttribute('data-theme', State.theme);
  document.getElementById('themeBtn').textContent = State.theme==='dark' ? '☾ Dark' : '☀ Light';
}
document.getElementById('themeBtn').onclick = ()=>{ State.theme = State.theme==='dark'?'light':'dark'; saveState(); applyTheme(); };
document.getElementById('fontPlus').onclick = ()=>{ State.fontScale = Math.min(1.4, State.fontScale+0.08); document.documentElement.style.setProperty('--fs-scale', State.fontScale); saveState(); };
document.getElementById('fontMinus').onclick = ()=>{ State.fontScale = Math.max(0.85, State.fontScale-0.08); document.documentElement.style.setProperty('--fs-scale', State.fontScale); saveState(); };
document.getElementById('focusBtn').onclick = ()=>{ document.body.classList.toggle('focus-mode'); document.getElementById('focusBtn').classList.toggle('active-toggle'); };
document.getElementById('printBtn').onclick = ()=> window.print();
document.getElementById('menuBtn').onclick = ()=>{ document.getElementById('sidebar').classList.add('open'); document.getElementById('overlayBg').classList.add('show'); };
document.getElementById('overlayBg').onclick = ()=>{ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlayBg').classList.remove('show'); };
document.getElementById('searchBox').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  const box = document.getElementById('searchResults');
  if(!q){ box.classList.add('hidden'); return; }
  const results=[];
  CHAPTERS.forEach(c=>{ if(c.title.toLowerCase().includes(q)) results.push({id:c.id, label:c.title, sub:c.group}); });
  if(!results.length){ box.innerHTML = `<div class="sr-item">No matches.</div>`; }
  else{ box.innerHTML = results.slice(0,12).map(r=>`<div class="sr-item" onclick="goTo('${r.id}'); document.getElementById('searchResults').classList.add('hidden'); document.getElementById('searchBox').value='';">${r.label}<br><small style="color:var(--text-faint)">${r.sub}</small></div>`).join(''); }
  box.classList.remove('hidden');
});

/* ============================================================
   5. SHARED RENDER HELPERS
   ============================================================ */
function chapterHeader(container, eyebrow, title, meta){
  const h = document.createElement('div');
  h.innerHTML = `<div class="eyebrow">${eyebrow}</div><h1>${title}</h1>${meta?`<div class="chapter-meta">${meta}</div>`:''}`;
  container.appendChild(h);
}
function bookmarkRow(id){
  const marked = !!State.bookmarks[id];
  return `<button class="topbtn no-print" style="margin-bottom:16px" onclick="toggleBookmark('${id}', this)">${marked?'★ Bookmarked':'☆ Bookmark this section'}</button>`;
}
function toggleBookmark(id, btn){
  State.bookmarks[id] = !State.bookmarks[id]; saveState();
  btn.textContent = State.bookmarks[id] ? '★ Bookmarked' : '☆ Bookmark this section';
}
function noteBox(id){
  const val = State.notes[id]||'';
  return `<div class="card no-print"><h4>📝 My Notes</h4><textarea class="note-area" id="note-${id}" oninput="State.notes['${id}']=this.value; saveState();">${val}</textarea></div>`;
}
function dialogueBlock(lines, title){
  return `<div class="dlg-wrap">
    ${title?`<div class="dlg-title">${title}</div>`:''}
    ${lines.map(l=>`
      <div class="dlg-line">
        <span class="dlg-spk">${l.speaker||l.spk}</span>
        <div class="dlg-body">
          <div class="dlg-kr kr">${l.kr}</div>
          <div class="sen-rom">${l.rom}</div>
          <div class="sen-eng">${l.eng}</div>
        </div>
        ${spkBtn(l.kr.replace(/<[^>]*>/g,''))}
      </div>`).join('')}
  </div>`;
}

/* ============================================================
   6. UNIT CONTENT-BLOCK RENDERER
   ============================================================ */
function renderBodyBlock(b){
  if(b.type==='p') return `<p>${b.text}</p>`;
  if(b.type==='tip') return `<div class="callout tip"><span class="callout-label">💡 Tip</span>${b.text}</div>`;
  if(b.type==='fun') return `<div class="callout fact"><span class="callout-label">✨ Fun Fact</span>${b.text}</div>`;
  if(b.type==='warn') return `<div class="callout warn"><span class="callout-label">⚠ Watch Out</span>${b.text}</div>`;
  if(b.type==='sentence-list'){
    return '<div>' + b.items.map(it=>{
      const arrowParts = it.kr.split(' -> ');
      const spk = arrowParts.length===2
        ? spkBtn(arrowParts[0]) + spkBtn(arrowParts[1])
        : spkBtn(it.kr);
      return `
      <div class="sen-row">
        ${spk}<span class="kr">${it.kr}</span><span class="kr-rom">${it.rom}</span><span class="eng">${it.eng}</span>
      </div>`;
    }).join('') + '</div>';
  }
  if(b.type==='table'){
    const lastCol = b.rows.length ? b.rows[0].length-1 : 0;
    let head = '<tr>'+b.headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
    let rows = b.rows.map(r=>'<tr>'+r.map((c,i)=>`<td class="${i===lastCol?'kr':''}">${c}</td>`).join('')+'</tr>').join('');
    return `<table class="cheat-table">${head}${rows}</table>`;
  }
  if(b.type==='dialogue'){
    return dialogueBlock(b.items);
  }
  return '';
}
function renderUnit(el, unit){
  chapterHeader(el, `${unit.group}`, `Unit ${unit.num} — ${unit.title}`, `<span class="kr">${unit.kr}</span>`);
  el.insertAdjacentHTML('beforeend', bookmarkRow(unit.id));
  el.insertAdjacentHTML('beforeend', `<p>${unit.intro}</p>`);
  el.insertAdjacentHTML('beforeend', unit.body.map(renderBodyBlock).join(''));
  el.insertAdjacentHTML('beforeend', `<h3>Check your understanding</h3><div id="quiz-${unit.id}"></div>`);
  const quizData = unit.quiz.map((q,i)=>({q:q.q, options:q.options, answer:q.options[q.correct], explain:q.explain, key:unit.id+'::'+i}));
  el.querySelector(`#quiz-${unit.id}`).appendChild(buildQuiz('quiz-'+unit.id+'-inner', quizData));
  el.insertAdjacentHTML('beforeend', noteBox(unit.id));
}

/* ============================================================
   7. QUIZ ENGINE (shared, with mistakes-bank + explanation support)
   ============================================================ */
function buildQuiz(id, data, isFinal){
  const wrap = document.createElement('div');
  wrap.id = id;
  let idx=0, score=0;
  function draw(){
    if(idx>=data.length){
      const pct = Math.round((score/data.length)*100);
      wrap.innerHTML = `<div class="quiz-score">Score: ${score} / ${data.length} (${pct}%)</div>
        ${isFinal ? (pct>=70 ? `<div class="callout"><span class="callout-label">Passed!</span>You've earned your certificate. <button class="btn" style="margin-top:8px" onclick="markComplete('finalexam'); goTo('certificate')">Go to Certificate →</button></div>` : `<div class="callout warn"><span class="callout-label">Almost there</span>Review the Spaced-Repetition deck and try again — 70% is the passing mark.</div>`) : ''}
        <div class="btn-row" style="justify-content:center"><button class="btn secondary" onclick="${isFinal?"goTo('finalexam')":"goTo(State.current)"}">Retry Quiz</button></div>`;
      addXP(score*3);
      if(isFinal && pct>=70) markComplete('finalexam');
      return;
    }
    const q = data[idx];
    wrap.innerHTML = `
      <div class="quiz-q">
        <div class="qtext">${q.q}</div>
        <div class="qopts">${q.options.map(o=>`<button class="qopt" data-o="${o.replace(/"/g,'&quot;')}">${o}</button>`).join('')}</div>
        <div class="qfeedback"></div>
        <div style="margin-top:8px;color:var(--text-faint);font-size:.78em">${idx+1} / ${data.length}</div>
      </div>`;
    wrap.querySelectorAll('.qopt').forEach(btn=>{
      btn.onclick = ()=>{
        wrap.querySelectorAll('.qopt').forEach(b=>b.disabled=true);
        const correct = btn.dataset.o === q.answer;
        btn.classList.add(correct?'correct':'wrong');
        if(!correct) wrap.querySelector(`.qopt[data-o="${CSS.escape(q.answer)}"]`)?.classList.add('correct');
        wrap.querySelector('.qfeedback').textContent = (correct ? '✓ Correct! ' : `The correct answer is "${q.answer}". `) + (q.explain||'');
        if(correct) score++;
        if(q.key) registerAnswer(q.key, correct);
        setTimeout(()=>{ idx++; draw(); }, 1100);
      };
    });
  }
  draw();
  return wrap;
}

function collectVocab(){
  const deck = [];
  UNITS.forEach(u=>{
    u.body.forEach(b=>{
      if(b.type==='sentence-list') b.items.forEach(it=>deck.push({front:it.kr, frontRom:it.rom, back:it.eng}));
      if(b.type==='dialogue') b.items.forEach(it=>deck.push({front:it.kr, frontRom:it.rom, back:it.eng}));
    });
  });
  return deck;
}

function renderMatching(el){
  chapterHeader(el, 'Practice', 'Match the Pairs', 'Match each Korean phrase to its English meaning.');
  el.insertAdjacentHTML('beforeend', bookmarkRow('matching'));
  const pairs = sample(collectVocab(), 6);
  const cards = [];
  pairs.forEach(p=>{ cards.push({key:p.front, side:'kr', val:p.front, rom:p.frontRom}); cards.push({key:p.front, side:'en', val:p.back}); });
  const shuffled = shuffle(cards);
  const grid = document.createElement('div'); grid.className='match-grid'; grid.id='matchGrid';
  grid.innerHTML = shuffled.map((c,i)=>`<div class="match-card" data-i="${i}" data-key="${c.key.replace(/"/g,'&quot;')}" onclick="matchClick(${i})"><span class="${c.side==='kr'?'kr':''}">${c.val}</span>${c.side==='kr'&&c.rom?`<span class="mc-rom">${c.rom}</span>`:''}</div>`).join('');
  const status = document.createElement('div'); status.id='matchStatus'; status.style.cssText='text-align:center;margin:14px 0;color:var(--text-dim)';
  el.appendChild(grid); el.appendChild(status);
  const retry = document.createElement('div'); retry.className='btn-row'; retry.style.justifyContent='center';
  retry.innerHTML = `<button class="btn secondary" onclick="goTo('matching')">🔄 New Set</button>`;
  el.appendChild(retry);
  window._matchData = shuffled; window._matchSel=[]; window._matchFound=0; window._matchTries=0;
  updateMatchStatus();
  el.appendChild(document.createRange().createContextualFragment(noteBox('matching')));
}
function updateMatchStatus(){ document.getElementById('matchStatus').textContent = `Pairs found: ${window._matchFound} / ${window._matchData.length/2}   •   Tries: ${window._matchTries}`; }
function matchClick(i){
  const cards = document.querySelectorAll('#matchGrid .match-card');
  const cardEl = cards[i];
  if(cardEl.classList.contains('matched') || window._matchSel.includes(i)) return;
  cardEl.classList.add('sel'); window._matchSel.push(i);
  if(window._matchSel.length===2){
    window._matchTries++;
    const [a,b] = window._matchSel;
    const same = window._matchData[a].key === window._matchData[b].key;
    setTimeout(()=>{
      if(same){ cards[a].classList.add('matched'); cards[b].classList.add('matched'); window._matchFound++; if(window._matchFound===window._matchData.length/2){ addXP(20); } }
      cards[a].classList.remove('sel'); cards[b].classList.remove('sel');
      window._matchSel=[];
      updateMatchStatus();
    }, same?250:650);
  }
}
