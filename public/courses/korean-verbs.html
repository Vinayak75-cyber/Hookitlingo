async function initiateCertPayment(nm){
  const payArea = document.getElementById('certPayArea');
  payArea.innerHTML = `<div class="hkl-loading-spinner"></div><p class="hkl-secure-note">Preparing secure checkout…</p>`;

  try{
    const orderRes = await fetch(`${SUPPORT_API_BASE}/api/create-order`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ amount: 9900, purpose: 'certificate-verbs' })
    });
    if(!orderRes.ok){
      const err = await orderRes.json();
      throw new Error(err.error || 'Failed to create order');
    }
    const { orderId, amount, currency, key } = await orderRes.json();

    const options = {
      key, amount, currency,
      name: "Hookitlingo",
      description: "Hookitlingo · Verb Tenses &amp; Conjugation Certificate — official PDF",
      order_id: orderId,
      theme: { color: "#e58aa2" },
      prefill: { name: nm, email:"", contact:"" },
      handler: async function(response){ await verifyCertPayment(response, orderId, nm); },
      modal: { ondismiss: function(){ renderCertRetry(nm); } }
    };
    const rzp = new Razorpay(options);
    rzp.open();
  } catch(err){
    console.error('Certificate payment initiation failed:', err);
    payArea.innerHTML = `<p class="hkl-secure-note" style="color:var(--vermilion)">${err.message}</p><button class="btn" id="certRetryBtn">Try again</button>`;
    document.getElementById('certRetryBtn').onclick = () => initiateCertPayment(nm);
  }
}

async function verifyCertPayment(response, orderId, nm){
  const payArea = document.getElementById('certPayArea');
  if(payArea) payArea.innerHTML = `<div class="hkl-loading-spinner"></div><p class="hkl-secure-note">Verifying payment…</p>`;

  try{
    const verifyRes = await fetch(`${SUPPORT_API_BASE}/api/verify-payment`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        orderId: response.razorpay_order_id || orderId,
        paymentId: response.razorpay_payment_id,
        signature: response.razorpay_signature,
        name: nm
      })
    });
    const result = await verifyRes.json();
    if(!result.verified) throw new Error('Payment verification failed');

    localStorage.setItem('kv_cert_payment_id', result.paymentId);
    goTo('certificate'); // re-render — will now show the unlocked state
  } catch(err){
    console.error('Certificate verification failed:', err);
    if(payArea){
      payArea.innerHTML = `<p class="hkl-secure-note" style="color:var(--vermilion)">We couldn't verify your payment. If you were charged, please contact us.</p><button class="btn" id="certRetryBtn2">Try again</button>`;
      document.getElementById('certRetryBtn2').onclick = () => initiateCertPayment(nm);
    }
  }
}

    <div class="support-icon">🌸</div>
    <h2>Keep Hookitlingo free for everyone?</h2>
    <p>Every course here is free, forever, with no ads. If Hookitlingo has helped you learn Korean, a small contribution helps fund new lessons — completely optional.</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" id="supportYes">Yes, I'd like to help 💛</button>
      <button class="btn secondary" id="supportNo">Not right now</button>
    </div>`;
  document.getElementById('supportYes').onclick = renderSupportAmounts;
  document.getElementById('supportNo').onclick = renderSupportBye;
}

function renderSupportAmounts(){
  supportSelected = null;
  setSupportCardSize(false);
  const card = document.getElementById('supportCard');
  card.innerHTML = `
    <button class="support-back" id="supportBack">← back</button>
    <div class="support-icon">🌸</div>
    <h2>Choose an amount</h2>
    <p>Every rupee goes straight toward building the next set of courses.</p>
    <div class="hkl-amounts" id="supportAmounts">
      ${SUPPORT_AMOUNTS.map(a=>`<button class="hkl-amt" data-amt="${a}">₹${a}</button>`).join('')}
    </div>
    <div class="hkl-custom-row">
      <span>₹</span>
      <input type="number" min="1" placeholder="Custom amount" id="supportCustom">
    </div>
    <button class="btn" id="supportPay" disabled style="width:100%">Continue to payment</button>
    <p class="hkl-secure-note">🔒 Handled securely by Razorpay. Hookitlingo never sees or stores your card details.</p>`;

  document.getElementById('supportBack').onclick = renderSupportAsk;
  const payBtn = document.getElementById('supportPay');
  const customInput = document.getElementById('supportCustom');

  document.querySelectorAll('#supportAmounts .hkl-amt').forEach(btn=>{
    btn.onclick = () => {
      document.querySelectorAll('#supportAmounts .hkl-amt').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      supportSelected = { type:'preset', amount: btn.dataset.amt };
      customInput.value = '';
      payBtn.disabled = false;
    };
  });

  customInput.oninput = () => {
    document.querySelectorAll('#supportAmounts .hkl-amt').forEach(b=>b.classList.remove('selected'));
    const v = parseFloat(customInput.value);
    if(v > 0){ supportSelected = { type:'custom', amount: v }; payBtn.disabled = false; }
    else { supportSelected = null; payBtn.disabled = true; }
  };

  payBtn.onclick = () => {
    if(!supportSelected) return;
    initiateSupportPayment(supportSelected);
  };
}

function renderSupportBye(){
  setSupportCardSize(false);
  const card = document.getElementById('supportCard');
  card.innerHTML = `
    <div class="support-icon">😢</div>
    <h2>No worries!</h2>
    <p>Thanks for learning with us anyway — enjoy the rest of the course.</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn secondary" onclick="closeSupportScreen()">Back to the course →</button>
    </div>`;
}

async function initiateSupportPayment(sel){
  const amount = sel.type === 'preset' ? parseInt(sel.amount) : parseFloat(sel.amount);
  const amountInPaise = Math.round(amount * 100);
  const card = document.getElementById('supportCard');

  card.innerHTML = `
    <div class="support-icon">🌸</div>
    <h2>Preparing secure checkout...</h2>
    <div class="hkl-loading-spinner"></div>
    <p class="hkl-secure-note">You're contributing <strong style="color:var(--vermilion)">₹${amount}</strong></p>`;

  try {
    const orderRes = await fetch(`${SUPPORT_API_BASE}/api/create-order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: amountInPaise })
    });
    if(!orderRes.ok){
      const err = await orderRes.json();
      throw new Error(err.error || 'Failed to create order');
    }
    const { orderId, amount: verifiedAmount, currency, key } = await orderRes.json();

    const options = {
      key: key,
      amount: verifiedAmount,
      currency: currency,
      name: "Hookitlingo",
      description: "Support Hookitlingo — Verb Tenses & Conjugation course",
      order_id: orderId,
      theme: { color: "#e58aa2" },
      prefill: { name: "", email: "", contact: "" },
      handler: async function(response){ await verifySupportPayment(response, orderId); },
      modal: { ondismiss: function(){ renderSupportAmounts(); } }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch(err){
    console.error('Support payment initiation failed:', err);
    card.innerHTML = `
      <div class="support-icon">😢</div>
      <h2>Something went wrong</h2>
      <p>${err.message}</p>
      <button class="btn" id="supportRetry">Try again</button>`;
    document.getElementById('supportRetry').onclick = renderSupportAmounts;
  }
}

        </svg>

        <p style="font-size:.8em; color:var(--text-faint);">Payment ID: <code>${result.paymentId}</code></p>
        <div class="btn-row" style="justify-content:center">
          <button class="btn secondary" onclick="closeSupportScreen()">Back to the course →</button>
        </div>`;
      speakThanksKR();
    } else {
      throw new Error('Payment verification failed');
    }
  } catch(err){
    console.error('Support verification failed:', err);
    card.innerHTML = `
      <div class="support-icon">⚠️</div>
      <h2>Verification failed</h2>
      <p>We couldn't verify your payment. If you were charged, please contact us.</p>
      <button class="btn" id="supportRetry2">Try again</button>`;
    document.getElementById('supportRetry2').onclick = renderSupportAmounts;

}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(arr,n){ return shuffle(arr).slice(0,n); }

window.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const idx = CHAPTERS.findIndex(c=>c.id===State.current);
  if(e.key==='ArrowRight' && idx<CHAPTERS.length-1) goTo(CHAPTERS[idx+1].id);
  if(e.key==='ArrowLeft' && idx>0) goTo(CHAPTERS[idx-1].id);
});

(function spawnPetals(){
  const host = document.getElementById('petals');
  if(!host) return;
  const colors = ['var(--petal)','var(--vermilion)','var(--gold)'];
  const count = window.innerWidth < 700 ? 10 : 18;
  for(let i=0;i<count;i++){
    const size = 10 + Math.random()*12;
    const left = Math.random()*100;
    const dur = 10 + Math.random()*12;
    const delay = -(Math.random()*dur);
    const drift = Math.round(Math.random()*90-45)+'px';
    const fill = colors[Math.floor(Math.random()*colors.length)];
    const rotStart = Math.round(Math.random()*360);
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `left:${left}%; width:${size}px; height:${size}px; animation-duration:${dur}s; animation-delay:${delay}s; --drift:${drift}; transform:rotate(${rotStart}deg);`;
    p.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 1c5 4.5 5 10.5 0 14-5-3.5-5-9.5 0-14Z" fill="${fill}" opacity="0.75"/></svg>`;
    host.appendChild(p);
  }
})();
</script>
