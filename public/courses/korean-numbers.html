<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 숫자 — Korean Grammar Part 3: Numbers, Counters &amp; Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Razorpay Checkout SDK — for the Support page's donation flow -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
/* ============================================================
   TOKENS — same palette as every Hookitlingo course
   ============================================================ */
:root{
  --ink:#1c1420; --surface:#26192b; --surface2:#2f2035; --surface3:#3b2941;
  --border:#4a3550;
  --text:#f6ecec; --text-dim:#c7b2c4; --text-faint:#8f7a91;
  --vermilion:#e58aa2; --vermilion-dim:#5a2c3a;
  --celadon:#5fa688; --celadon-dim:#2a4a3d;
  --gold:#d9ab5c; --gold-dim:#5c471e;
  --inkblue:#a084c9; --inkblue-dim:#3a2c50;
  --petal:#f3b6c6;
  --radius:16px; --radius-sm:10px;
  --serif:"Cormorant Garamond","Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --kr:"Noto Serif KR","Apple SD Gothic Neo","Malgun Gothic","Nanum Gothic",sans-serif;
  --maxw:880px;
  --fs-scale:1;
}
html[data-theme="light"]{
  --ink:#fdf3ef; --surface:#fffaf6; --surface2:#fbeee6; --surface3:#f5dfd6;
  --border:#eccabb;
  --text:#3a2530; --text-dim:#79576a; --text-faint:#a98a9c;
  --vermilion:#c8546f; --vermilion-dim:#f6dae2;
  --celadon:#3f7d63; --celadon-dim:#d9ece2;
  --gold:#a4762b; --gold-dim:#f2e2c2;
  --inkblue:#75509f; --inkblue-dim:#e7ddf2;
  --petal:#e59fb2;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; color:var(--text); font-family:var(--sans);
  font-size:calc(16px*var(--fs-scale)); line-height:1.65; transition:background .3s,color .3s;
  background:
    radial-gradient(1100px 620px at 12% -8%, color-mix(in srgb, var(--vermilion) 16%, transparent), transparent 58%),
    radial-gradient(900px 520px at 104% 6%, color-mix(in srgb, var(--gold) 12%, transparent), transparent 55%),
    var(--ink);
  background-attachment:fixed;
}
body.print-mode{background:#fff;color:#111;}
::selection{background:var(--vermilion); color:#fff;}
h1,h2,h3,h4{font-family:var(--serif); font-weight:600; letter-spacing:.2px; margin:0 0 .5em;}
h1{font-size:2.2em;} h2{font-size:1.6em;} h3{font-size:1.25em;} h4{font-size:1.05em;}
p{margin:0 0 1em;}
a{color:var(--celadon);}
.kr{font-family:var(--kr);}
.kr-rom{font-family:var(--serif); font-style:italic; color:var(--gold); font-size:.7em; margin-left:4px; white-space:nowrap;}
button{font-family:var(--sans); cursor:pointer;}
.hidden{display:none !important;}

/* Petals */
.petals{position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden;}
.petal{position:absolute; top:-8%; will-change:transform; animation:petal-fall linear infinite;}
.petal svg{display:block; filter:drop-shadow(0 1px 1px rgba(0,0,0,.08));}
@keyframes petal-fall{0%{transform:translate(0,-10vh) rotate(0deg);} 100%{transform:translate(var(--drift,50px), 112vh) rotate(340deg);}}
@media (prefers-reduced-motion: reduce){ .petals{display:none;} }
@media print{ .petals{display:none;} }
@media(max-width:900px){ .petals .petal:nth-child(even){display:none;} }

/* Layout shell */
#app{display:flex; min-height:100vh; position:relative; z-index:2;}
#sidebar{
  width:280px; flex:none; background:var(--surface); border-right:1px solid var(--border);
  position:sticky; top:0; height:100vh; overflow-y:auto; padding:18px 14px 40px; transition:transform .3s; z-index:40;
}
#sidebar::-webkit-scrollbar{width:6px;} #sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.brand{display:flex; align-items:center; gap:10px; padding:6px 8px 18px; border-bottom:1px solid var(--border); margin-bottom:14px;}
.brand-block{
  width:44px;height:44px;border-radius:50%; flex:none; position:relative;
  background:radial-gradient(circle at 33% 28%, color-mix(in srgb, var(--vermilion) 88%, #fff 12%), var(--vermilion) 72%);
  display:flex;align-items:center;justify-content:center; font-family:var(--kr); font-weight:700; font-size:19px; color:#fff9f7;
  transform:rotate(-7deg); box-shadow:0 4px 12px color-mix(in srgb, var(--vermilion) 50%, transparent), inset 0 0 0 2px color-mix(in srgb, #fff 22%, transparent);
}
.brand-txt strong{display:block; font-family:var(--serif); font-size:1.05em;}
.brand-txt span{display:block; font-size:.72em; color:var(--text-faint); letter-spacing:.08em; text-transform:uppercase;}

.progress-mini{margin:0 8px 16px; padding:10px 12px; background:var(--surface2); border-radius:var(--radius-sm); border:1px solid var(--border);}
.progress-mini .row{display:flex; justify-content:space-between; font-size:.78em; color:var(--text-dim); margin-bottom:6px;}
.bar-track{height:6px; background:var(--surface3); border-radius:4px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg,var(--vermilion),var(--gold)); width:0%; transition:width .4s;}
.streak-row{display:flex; justify-content:space-between; font-size:.78em; color:var(--text-dim); margin-top:6px;}
.streak-row b{color:var(--gold); font-family:var(--serif);}

.nav-group{margin-bottom:6px;}
.nav-group-label{font-size:.68em; text-transform:uppercase; letter-spacing:.1em; color:var(--text-faint); padding:14px 10px 6px;}
.nav-item{display:flex; align-items:center; gap:9px; width:100%; text-align:left; padding:8px 10px; border-radius:8px; background:transparent; border:none; color:var(--text-dim); font-size:.88em; margin-bottom:1px;}
.nav-item:hover{background:var(--surface2); color:var(--text);}
.nav-item.active{background:var(--vermilion-dim); color:var(--vermilion); font-weight:600;}
html[data-theme="light"] .nav-item.active{color:#8a2c4a;}
.nav-item .dot{width:6px;height:6px;border-radius:50%; background:var(--border); flex:none;}
.nav-item.done .dot{background:var(--celadon);}
.nav-item .lbl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

#mainWrap{flex:1; min-width:0; display:flex; flex-direction:column;}
#topbar{position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:10px; padding:10px 20px 14px; background:color-mix(in srgb, var(--ink) 85%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);}
#topbar::after{content:''; position:absolute; left:0; right:0; bottom:-1px; height:7px; background-image: radial-gradient(circle at 9px 0, transparent 8px, color-mix(in srgb, var(--vermilion) 45%, var(--border)) 8px, color-mix(in srgb, var(--vermilion) 45%, var(--border)) 9px, transparent 9px); background-size:18px 10px; background-repeat:repeat-x; opacity:.55; pointer-events:none;}
#menuBtn{display:none; background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;}
.readbar-track{flex:1; height:4px; background:var(--surface2); border-radius:3px; overflow:hidden;}
.readbar-fill{height:100%; width:0%; background:linear-gradient(90deg,var(--celadon),var(--inkblue)); transition:width .15s;}
.topbtn{background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); border-radius:8px; padding:6px 10px; font-size:.85em; display:flex; align-items:center; gap:5px;}
.topbtn:hover{color:var(--text); border-color:var(--celadon);}
.topbtn.active-toggle{color:var(--gold); border-color:var(--gold-dim);}
#searchBox{background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 10px; font-size:.85em; width:150px;}
#searchResults{position:absolute; top:52px; right:20px; width:320px; max-height:60vh; overflow:auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:0 20px 50px rgba(0,0,0,.5); z-index:60;}
#searchResults .sr-item{padding:10px 12px; border-bottom:1px solid var(--border); font-size:.85em; cursor:pointer;}
#searchResults .sr-item:hover{background:var(--surface2);}

main{flex:1; padding:36px 40px 80px; max-width:var(--maxw); margin:0 auto; width:100%;}
.chapter{display:none; animation:fadeIn .35s ease;}
.chapter.active{display:block;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

.eyebrow{font-size:.75em; letter-spacing:.14em; text-transform:uppercase; color:var(--vermilion); font-weight:700; margin-bottom:8px;}
.chapter-meta{display:flex; gap:14px; color:var(--text-faint); font-size:.82em; margin-bottom:26px; flex-wrap:wrap;}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin:18px 0;}
.callout{border-left:3px solid var(--celadon); background:var(--celadon-dim); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:14px 18px; margin:18px 0; color:var(--text);}
.callout.warn{border-color:var(--vermilion); background:var(--vermilion-dim);}
.callout.tip{border-color:var(--gold); background:var(--gold-dim);}
.callout.fact{border-color:var(--inkblue); background:var(--inkblue-dim);}
.callout-label{font-weight:700; font-size:.78em; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; display:block;}

.spk-btn{background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); border-radius:20px; padding:5px 12px; font-size:.78em; display:inline-flex; align-items:center; gap:6px; flex:none;}
.spk-btn:hover{border-color:var(--vermilion); color:var(--vermilion);}
.spk-btn.loading{opacity:.5; pointer-events:none;}
.spk-btn.playing{border-color:var(--celadon); color:var(--celadon);}

.btn{background:linear-gradient(135deg,var(--vermilion), color-mix(in srgb, var(--vermilion) 55%, var(--gold) 45%)); color:#fff; border:none; border-radius:999px; padding:11px 22px; font-size:.9em; font-weight:600; letter-spacing:.2px;}
.btn:hover{filter:brightness(1.06); box-shadow:0 6px 18px color-mix(in srgb, var(--vermilion) 35%, transparent);}
.btn.secondary{background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:999px;}
.btn.secondary:hover{border-color:var(--celadon); color:var(--celadon);}
.btn:disabled{opacity:.4; cursor:default;}
.btn-row{display:flex; gap:10px; flex-wrap:wrap; margin:16px 0;}

/* ============================================================
   NUMBER CHIPS — signature visual: native vs sino, color-coded
   ============================================================ */
.n-chip{display:inline-flex; align-items:center; justify-content:center; font-family:var(--kr); font-weight:700; padding:2px 8px; border-radius:7px; margin:0 2px; color:#fff; font-size:.94em;}
.n-native{background-color:var(--inkblue);}
.n-sino{background-color:var(--gold); color:#2a1e10;}
.n-counter{background-color:var(--celadon);}
.n-currency{background-color:var(--vermilion);}
.n-legend{display:flex; gap:14px; flex-wrap:wrap; margin:12px 0 20px; font-size:.8em; color:var(--text-dim);}
.n-legend-item{display:flex; align-items:center; gap:6px;}
.n-swatch{width:12px;height:12px;border-radius:4px; display:inline-block;}
.blank-mark{color:var(--vermilion); font-weight:700;}

/* Dialogue / scenario blocks */
.dlg-wrap{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin:16px 0;}
.dlg-title{font-family:var(--serif); font-style:italic; color:var(--text-faint); font-size:.88em; margin-bottom:14px; padding-bottom:10px; border-bottom:1px dashed var(--border);}
.dlg-line{display:flex; gap:12px; align-items:flex-start; margin-bottom:16px;}
.dlg-line:last-child{margin-bottom:0;}
.dlg-spk{flex:none; width:84px; font-family:var(--serif); font-weight:600; color:var(--gold); font-size:.85em; padding-top:3px;}
.dlg-body{flex:1; min-width:0;}
.dlg-kr{font-size:1.18em; margin-bottom:3px; line-height:1.6;}
.sen-rom{color:var(--gold); font-family:var(--serif); font-style:italic; font-size:.85em; margin-bottom:3px;}
.sen-eng{color:var(--text-dim); font-size:.88em;}

/* Clock display */
.clock-wrap{display:flex; flex-direction:column; align-items:center; gap:10px; margin:20px 0;}
.clock-wrap svg{width:200px; height:200px;}
.clock-caption{font-size:.85em; color:var(--text-faint); display:flex; gap:16px;}
.clock-caption span{display:flex; align-items:center; gap:6px;}

/* Predicate/choice style cards */
.pd-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin:14px 0;}
.pd-rom{font-family:var(--serif); font-style:italic; color:var(--gold); font-size:.62em; margin:2px 0 8px;}
.pd-opts{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
.pd-opt{background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:20px; padding:6px 14px; font-size:.9em;}
.pd-opt.correct{background:var(--celadon-dim); border-color:var(--celadon); color:var(--celadon);}
.pd-opt.wrong{background:var(--vermilion-dim); border-color:var(--vermilion); color:var(--vermilion);}

/* Error Hunt */
.eh-sentence{display:flex; flex-wrap:wrap; gap:5px; align-items:center; font-size:1.25em; margin:14px 0;}
.eh-tok{font-family:var(--kr); background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:4px 9px;}
.eh-tok.clickable{cursor:pointer;}
.eh-tok.clickable:hover{border-color:var(--vermilion);}
.eh-tok.found-error{border-color:var(--vermilion); background:var(--vermilion-dim); color:var(--vermilion);}
.eh-tok.wrong-click{opacity:.4;}

/* Tap-to-place blanks */
.ds-sentence{display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:1.25em; margin:14px 0; font-family:var(--kr);}
.ds-blank{min-width:40px; display:inline-flex; align-items:center; justify-content:center; border:2px dashed var(--border); border-radius:8px; padding:3px 9px; color:var(--text-faint); min-height:30px;}
.ds-blank.filled{border-style:solid; border-color:var(--gold); color:var(--gold); cursor:pointer; background:var(--gold-dim);}
.scramble-pool{display:flex; gap:8px; flex-wrap:wrap; padding:10px; margin:10px 0; background:var(--surface2); border-radius:10px; min-height:52px;}
.scramble-chip{background:var(--surface3); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:7px 14px; font-family:var(--kr); font-size:1.05em;}
.scramble-chip:hover{border-color:var(--celadon);}

/* Quiz */
.quiz-q{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin:16px 0;}
.quiz-q .qtext{font-family:var(--kr); font-size:1.3em; margin-bottom:14px;}
.quiz-q .qtext.eng{font-family:var(--sans); font-size:1.05em;}
.qopts{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
@media(max-width:520px){.qopts{grid-template-columns:1fr;}}
.qopt{background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; text-align:left; color:var(--text); font-size:.95em;}
.qopt:hover{border-color:var(--celadon);}
.qopt.correct{background:var(--celadon-dim); border-color:var(--celadon); color:var(--celadon);}
.qopt.wrong{background:var(--vermilion-dim); border-color:var(--vermilion); color:var(--vermilion);}
.qopt:disabled{pointer-events:none;}
.qfeedback{margin-top:10px; font-size:.85em; color:var(--text-dim); min-height:1.2em;}
.quiz-score{font-family:var(--serif); font-size:1.4em; text-align:center; margin:20px 0;}

/* Speed round */
.speed-bar-track{height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; margin-bottom:16px;}
.speed-bar-fill{height:100%; background:linear-gradient(90deg,var(--celadon),var(--vermilion)); width:100%;}
.speed-stats{display:flex; justify-content:center; gap:22px; margin-bottom:10px; font-size:.9em; color:var(--text-dim); flex-wrap:wrap;}
.speed-stats b{color:var(--gold); font-family:var(--serif);}

/* Flashcards */
.flash-wrap{max-width:420px; margin:20px auto;}
.flashcard{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); height:220px; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:20px; cursor:pointer; user-select:none; position:relative;}
.flashcard .fc-face{font-family:var(--kr); font-size:2.2em;}
.flashcard .fc-rom{font-family:var(--serif); font-style:italic; color:var(--gold); font-size:.5em; margin-top:8px;}
.flashcard .fc-sub{color:var(--text-faint); font-size:.8em; margin-top:10px;}
.flashcard .fc-back{display:none;}
.flashcard.flipped .fc-front{display:none;} .flashcard.flipped .fc-back{display:flex; flex-direction:column; align-items:center;}
.flash-controls{display:flex; justify-content:space-between; align-items:center; margin-top:14px;}
.flash-counter{color:var(--text-faint); font-size:.85em;}

/* Matching game */
.match-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:20px 0;}
@media(max-width:600px){.match-grid{grid-template-columns:repeat(3,1fr);}}
.match-card{aspect-ratio:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; display:flex;align-items:center;justify-content:center; flex-direction:column; font-family:var(--kr); font-size:1.1em; padding:6px; text-align:center;}
.match-card .mc-rom{display:block; font-family:var(--serif); font-style:italic; color:var(--gold); font-size:.5em; margin-top:3px;}
.match-card.sel{border-color:var(--gold); background:var(--gold-dim);}
.match-card.matched{border-color:var(--celadon); background:var(--celadon-dim); opacity:.55;}

/* Cheat sheet */
.cheat-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; margin:20px 0;}
.cheat-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px;}
.cheat-card h4{margin-bottom:6px;}
.cheat-card p{color:var(--text-dim); font-size:.88em;}
.cheat-table{width:100%; border-collapse:collapse; font-size:.92em; margin:10px 0;}
.cheat-table th,.cheat-table td{padding:6px 10px; border-bottom:1px solid var(--border); text-align:left;}
.cheat-table th{color:var(--text-faint); font-weight:600; font-size:.78em; text-transform:uppercase; letter-spacing:.04em;}
.cheat-table td.kr{font-size:1.05em;}

/* Roadmap timeline */
.roadmap{position:relative; margin:30px 0; padding-left:26px; border-left:2px solid var(--border);}
.rm-item{position:relative; padding-bottom:26px;}
.rm-item::before{content:''; position:absolute; left:-32px; top:2px; width:12px; height:12px; border-radius:50%; background:var(--surface); border:2px solid var(--celadon);}
.rm-item h4{margin-bottom:2px;}
.rm-item span{color:var(--text-faint); font-size:.82em;}

.badge-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:14px; margin:18px 0;}
.badge{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 10px; text-align:center; opacity:.35;}
.badge.earned{opacity:1; border-color:var(--gold);}
.badge .bicon{font-size:2em; margin-bottom:6px;}
.badge .bname{font-size:.78em; color:var(--text-dim);}

.toc-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; margin:24px 0;}
.toc-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; cursor:pointer;}
.toc-card:hover{border-color:var(--vermilion);}
.toc-card .num{font-family:var(--serif); color:var(--vermilion); font-size:.85em;}
.toc-card h4{margin:4px 0 2px;}
.toc-card p{color:var(--text-faint); font-size:.82em; margin:0;}

.cover{min-height:calc(100vh - 60px); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 20px;}
.presents{font-family:var(--serif); font-style:italic; color:var(--text-faint); font-size:1.05em; letter-spacing:.03em; margin-bottom:10px;}
.powered-by{position:fixed; right:14px; bottom:14px; z-index:50; background:var(--surface2); border:1px solid var(--border); color:var(--text-faint); font-size:.72em; letter-spacing:.03em; padding:6px 12px; border-radius:20px; text-decoration:none; box-shadow:0 8px 24px rgba(0,0,0,.25); transition:color .2s, border-color .2s;}
.powered-by:hover{color:var(--vermilion); border-color:var(--vermilion);}
@media(max-width:900px){.powered-by{right:10px; bottom:10px; font-size:.68em; padding:5px 10px;}}
.cover-block{width:210px;height:210px; margin:0 auto 26px;}
.cover-block svg{width:100%;height:100%;}
.cover h1{font-size:2.7em; margin-bottom:6px;}
.cover .sub{color:var(--text-dim); font-size:1.15em; max-width:560px; margin:0 auto 26px;}
.cover-stats{display:flex; gap:30px; margin:26px 0; flex-wrap:wrap; justify-content:center;}
.cover-stats div{text-align:center;}
.cover-stats b{display:block; font-family:var(--serif); font-size:1.6em; color:var(--gold);}
.cover-stats span{color:var(--text-faint); font-size:.78em; text-transform:uppercase; letter-spacing:.06em;}

mark{background:var(--gold-dim); color:var(--text); padding:0 2px; border-radius:2px;}
textarea.note-area{width:100%; min-height:90px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px; font-family:var(--sans); font-size:.9em; resize:vertical;}

.certificate{border:3px double var(--gold); border-radius:var(--radius); padding:50px 40px; text-align:center; background:var(--surface); margin:20px 0; position:relative; overflow:hidden;}
.certificate::before{content:''; position:absolute; width:260px; height:260px; right:-80px; top:-80px; border-radius:50%; background:radial-gradient(circle, color-mix(in srgb, var(--gold) 18%, transparent), transparent 70%); pointer-events:none;}
.certificate::after{content:'印'; position:absolute; right:34px; bottom:28px; width:64px; height:64px; border-radius:10px; border:3px solid var(--vermilion); color:var(--vermilion); font-size:30px; font-weight:700; display:flex; align-items:center; justify-content:center; transform:rotate(-9deg); opacity:.88;}
.certificate h2{font-family:var(--serif); font-size:2em; color:var(--gold);}
.certificate .cert-name{font-family:var(--serif); font-style:italic; font-size:1.8em; border-bottom:1px solid var(--border); display:inline-block; padding:4px 30px; margin:16px 0;}

@media print{
  #sidebar,#topbar,.no-print,.spk-btn{display:none !important;}
  #mainWrap{width:100%;}
  main{max-width:100%; padding:0;}
  body{background:#fff; color:#000;}
  .chapter{display:block !important;}
}
@media(max-width:900px){
  #sidebar{position:fixed; left:0; top:0; transform:translateX(-100%); box-shadow:0 0 40px rgba(0,0,0,.5);}
  #sidebar.open{transform:translateX(0);}
  #menuBtn{display:block;}
  main{padding:24px 18px 70px;}
  #searchBox,#searchResults{display:none;}
  #topbar{flex-wrap:wrap; row-gap:8px;}
  .topbtn{padding:6px 8px; font-size:.8em;}
}
@media(max-width:480px){
  #topbar{padding:10px 14px 12px;}
  .topbtn{padding:5px 7px; font-size:.72em; gap:3px;}
  .cover h1{font-size:2.1em;}
  .cover .sub{font-size:1em;}
}
.focus-mode #sidebar, .focus-mode #topbar .aux{display:none;}
.overlay-bg{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:35; display:none;}
.overlay-bg.show{display:block;}

/* ============================================================
   SUPPORT PAGE — donation flow (sakura theme, full-page)
   ============================================================ */
.nav-item-support{
  background:linear-gradient(135deg, color-mix(in srgb, var(--vermilion) 16%, transparent), color-mix(in srgb, var(--gold) 12%, transparent));
  border:1px solid color-mix(in srgb, var(--vermilion) 30%, var(--border));
  margin-top:4px;
}
.nav-item-support .lbl{color:var(--vermilion); font-weight:600;}
.nav-item-support:hover{border-color:var(--vermilion);}

.support-page{
  position:relative; min-height:calc(100vh - 60px); display:flex; align-items:center; justify-content:center;
  text-align:center; padding:60px 20px; overflow:hidden;
}
.support-bg{
  position:absolute; top:0; left:50%; width:100vw; height:100%; margin-left:-50vw;
  pointer-events:none; z-index:0; overflow:hidden;
}
.support-bg .tree{ position:absolute; bottom:-2%; width:240px; opacity:.9; transform-origin:50% 100%; }
.support-bg .tree-left{ left:1%; animation:treeSway 7s ease-in-out infinite; }
.support-bg .tree-right{ right:1%; animation:treeSwayR 7s ease-in-out infinite; animation-delay:-3.2s; }
@keyframes treeSway{ 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(1.4deg);} }
@keyframes treeSwayR{ 0%,100%{transform:scaleX(-1) rotate(0deg);} 50%{transform:scaleX(-1) rotate(1.4deg);} }
@media(max-width:900px){ .support-bg .tree{ width:130px; opacity:.5; } }
@media (prefers-reduced-motion: reduce){ .support-bg .tree{ animation:none; } .support-bg .tree-right{ transform:scaleX(-1); } }

.support-card{
  position:relative; z-index:1; width:100%; max-width:440px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius); padding:42px 34px 34px;
  box-shadow:0 30px 80px rgba(0,0,0,.35);
  animation:supportPop .5s cubic-bezier(.2,.9,.2,1);
}
@keyframes supportPop{ from{opacity:0; transform:translateY(18px) scale(.97);} to{opacity:1; transform:translateY(0) scale(1);} }
.support-icon{font-size:2.6em; margin-bottom:12px;}
.support-card h2{font-size:1.55em; margin-bottom:12px;}
.support-card p{color:var(--text-dim);}
.support-back{background:none; border:none; color:var(--text-faint); font-size:.8em; margin-bottom:16px; padding:2px;}
.support-back:hover{color:var(--text);}

.hkl-amounts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0 14px;}
.hkl-amt{
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:14px 8px; font-family:var(--serif); font-size:1.25em; font-weight:600; color:var(--text);
  transition:border-color .2s, background .2s, color .2s;
}
.hkl-amt:hover{border-color:var(--vermilion);}
.hkl-amt.selected{border-color:var(--vermilion); background:var(--vermilion-dim); color:var(--vermilion);}
.hkl-custom-row{
  display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:22px;
}
.hkl-custom-row span{color:var(--text-faint); font-weight:600;}
.hkl-custom-row input{
  flex:1; background:none; border:none; outline:none; color:var(--text); font-family:var(--serif);
  font-size:1.1em; font-weight:600; min-width:0;
}
.hkl-secure-note{margin-top:16px; font-size:.74em; color:var(--text-faint);}
.hkl-loading-spinner{
  width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--vermilion);
  border-radius:50%; animation:spin 1s linear infinite; margin:22px auto;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Bowing thank-you character */
.support-card.support-card--thanks{ max-width:500px; padding:46px 34px 36px; }
.hkl-bow-char{ width:160px; height:auto; display:block; margin:0 auto 10px; overflow:visible; }
.hkl-bow-upper{ transform-box:fill-box; transform-origin:50% 88%; animation:hklBow 2.3s ease-in-out; }
@keyframes hklBow{
  0%   { transform:rotate(0deg); }
  32%  { transform:rotate(24deg); }
  58%  { transform:rotate(24deg); }
  100% { transform:rotate(0deg); }
}
@media (prefers-reduced-motion: reduce){ .hkl-bow-upper{ animation:none; } }

/* Locked certificate teaser */
.cert-locked{ max-width:520px; margin:10px auto 0; text-align:center; }
.cert-locked-silhouette{ position:relative; margin:0 auto 22px; max-width:400px; }
.cert-locked-silhouette svg{ display:block; width:100%; filter:blur(2.5px); opacity:.55; }

.path-cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; margin:18px 0 8px;}
.path-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; display:flex; flex-direction:column;}
.path-card-eyebrow{font-size:.72em; text-transform:uppercase; letter-spacing:.1em; font-weight:700; margin-bottom:8px;}
.path-card--next{border-color:var(--celadon);}
.path-card--next .path-card-eyebrow{color:var(--celadon);}
.path-card--workbook{border-color:var(--gold);}
.path-card--workbook .path-card-eyebrow{color:var(--gold);}
.path-card h4{margin:0 0 10px; font-size:1.15em;}
.path-card p{color:var(--text-dim); font-size:.92em; margin:0 0 12px;}
.path-card-points{margin:0 0 16px; padding-left:1.2em; font-size:.88em; color:var(--text-dim);}
.path-card-points li{margin-bottom:5px;}
.path-card .btn{align-self:flex-start; margin-top:auto;}
.cert-lock-icon{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:2.6em; filter:drop-shadow(0 2px 6px rgba(0,0,0,.3)); }
.cert-locked h3{ margin-bottom:10px; }
.cert-locked p{ color:var(--text-dim); }
#certPayArea{ margin-top:18px; }
</style>
</head>

const SINO_DIGIT = ['', '일','이','삼','사','오','육','칠','팔','구'];
function sinoUnder10000(n){
  if(n===0) return '';
  let out='';
  const th = Math.floor(n/1000), hu = Math.floor((n%1000)/100), te = Math.floor((n%100)/10), on = n%10;
  if(th) out += (th===1?'':SINO_DIGIT[th]) + '천';
  if(hu) out += (hu===1?'':SINO_DIGIT[hu]) + '백';
  if(te) out += (te===1?'':SINO_DIGIT[te]) + '십';
  if(on) out += SINO_DIGIT[on];
  return out;
}
function toSino(n){
  if(n===0) return '영';
  const man = Math.floor(n/10000), rest = n%10000;
  let out='';
  if(man) out += (man===1?'':sinoUnder10000(man)) + '만';
  out += sinoUnder10000(rest);
  return out;
}
const NATIVE_ONES = ['','하나','둘','셋','넷','다섯','여섯','일곱','여덟','아홉'];
const NATIVE_TENS = ['','열','스물','서른','마흔','쉰','예순','일흔','여든','아흔'];
const NATIVE_MOD = {1:'한',2:'두',3:'세',4:'네',20:'스무'};
function toNative(n){ // plain counting form, 1-99
  if(n<1||n>99) return null;
  const te = Math.floor(n/10), on = n%10;
  let out='';
  if(te) out += NATIVE_TENS[te];
  if(on) out += NATIVE_ONES[on];
  return out;
}
function toNativeCounter(n){ // form used directly before a counter word, 1-99
  if(n===20) return '스무';
  const te = Math.floor(n/10), on = n%10;
  let out='';
  if(te) out += NATIVE_TENS[te];
  if(on) out += (NATIVE_MOD[on] || NATIVE_ONES[on]);
  return out;
}

const Audio_ = {
  queue: [], playing: false, currentAudio: null, ready: true,
  sanitize(text) { return text.replace(/[\\/:*?"<>|]/g, ''); },
  lookup(text) {
    const clean = this.sanitize(text).trim();
    const candidates = [text, clean, clean + '.', clean + ' '];
    for (const c of candidates) {
      if (Object.prototype.hasOwnProperty.call(AUDIO_DATA, c)) return AUDIO_DATA[c];
    }
    return null;
  },
  speak(text, btn) {
    if (!text) return;
    if (btn) { if (btn.dataset.busy === '1') return; btn.dataset.busy = '1'; btn.classList.add('loading'); }
    this.queue.push({ text, btn });
    this._pump();
  },
  _pump() {
    if (this.playing || !this.queue.length) return;
    const { text, btn } = this.queue.shift();
    this.playing = true;
    const dataUri = this.lookup(text);
    if (btn) { btn.classList.remove('loading'); btn.classList.add('playing'); }
    const done = () => {
      this.playing = false; this.currentAudio = null;
      if (btn) { btn.classList.remove('playing'); btn.dataset.busy = '0'; }
      setTimeout(() => this._pump(), 120);
    };
    if (!dataUri) {
      if (btn) { const orig = btn.innerHTML; btn.innerHTML = '❌ Missing'; setTimeout(() => btn.innerHTML = orig, 1500); }
      done(); return;
    }
    const audio = new Audio();
    this.currentAudio = audio;
    audio.onended = done;
    audio.onerror = () => { if (btn) { const orig = btn.innerHTML; btn.innerHTML = '❌ Missing'; setTimeout(() => btn.innerHTML = orig, 1500); } done(); };
    audio.addEventListener('canplaythrough', () => { audio.play().catch(() => done()); }, { once: true });
    audio.src = dataUri;
    audio.load();
  },
  stop() { if (this.currentAudio) { this.currentAudio.pause(); this.currentAudio = null; } this.playing = false; this.queue = []; }
};
function stripTags(html){ return html.replace(/<[^>]*>/g, ''); }
function spkBtn(text, label){
  label = label || '🔊 Listen';
  if (!text) return '';
  const safeText = JSON.stringify(text).replace(/"/g, '&quot;');
  return `<button class="spk-btn no-print" onclick="Audio_.speak(${safeText}, this)">${label}</button>`;
}

/* Clock face: hour hand = native accent (inkblue), minute hand = sino accent (gold) */
function clockSVG(hour, minute){
  const hourAngle = ((hour%12) + minute/60) * 30;
  const minAngle = minute * 6;
  const ticks = [];
  for(let i=0;i<12;i++){
    const a = i*30*Math.PI/180;
    const x1=100+80*Math.sin(a), y1=100-80*Math.cos(a), x2=100+92*Math.sin(a), y2=100-92*Math.cos(a);
    ticks.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--border)" stroke-width="3"/>`);
  }
  const numerals = [];
  for(let i=1;i<=12;i++){
    const a = i*30*Math.PI/180;
    const x=100+68*Math.sin(a), y=100-68*Math.cos(a)+5;
    numerals.push(`<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" font-size="13" fill="var(--text-faint)" font-family="var(--sans)">${i}</text>`);
  }
  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="96" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
    ${ticks.join('')}
    ${numerals.join('')}
    <line x1="100" y1="100" x2="${(100+42*Math.sin(hourAngle*Math.PI/180)).toFixed(1)}" y2="${(100-42*Math.cos(hourAngle*Math.PI/180)).toFixed(1)}" stroke="var(--inkblue)" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="${(100+66*Math.sin(minAngle*Math.PI/180)).toFixed(1)}" y2="${(100-66*Math.cos(minAngle*Math.PI/180)).toFixed(1)}" stroke="var(--gold)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="6" fill="var(--text)"/>
  </svg>`;
}
function clockDisplay(hour, minute){
  return `<div class="clock-wrap">${clockSVG(hour,minute)}
    <div class="clock-caption">
      <span><span class="n-swatch" style="background:var(--inkblue)"></span>Hour → Native</span>
      <span><span class="n-swatch" style="background:var(--gold)"></span>Minute → Sino</span>

}

window.dsFill = function(id, i, ci){
  const data = window['_ds_'+id]; const it = data[i];
  const poolBtn = document.querySelector(`#${id}-${i}-pool button[data-ci="${ci}"]`);
  if(!poolBtn || poolBtn.disabled) return;
  const emptyIdx = it.parts.findIndex((p,pi)=>p.blank && it.filled[pi]===null);
  if(emptyIdx===-1) return;
  it.filled[emptyIdx] = poolBtn.textContent;
  poolBtn.disabled = true; poolBtn.style.opacity = '.35';
  const blankEl = document.querySelector(`#${id}-${i}-sent .ds-blank[data-pi="${emptyIdx}"]`);
  blankEl.textContent = poolBtn.textContent; blankEl.classList.add('filled'); blankEl.dataset.ci = ci;
};
window.dsUnfill = function(id, i, pi){
  const data = window['_ds_'+id]; const it = data[i];
  const blankEl = document.querySelector(`#${id}-${i}-sent .ds-blank[data-pi="${pi}"]`);
  if(!blankEl.classList.contains('filled')) return;
  const ci = blankEl.dataset.ci;
  const poolBtn = document.querySelector(`#${id}-${i}-pool button[data-ci="${ci}"]`);
  if(poolBtn){ poolBtn.disabled = false; poolBtn.style.opacity = '1'; }
  it.filled[pi] = null; blankEl.textContent = ''; blankEl.classList.remove('filled'); delete blankEl.dataset.ci;
};
window.dsCheck = function(id, i){
  const data = window['_ds_'+id]; const it = data[i];
  const fb = document.getElementById(`${id}-${i}-fb`);
  const blankIdxs = it.parts.map((p,pi)=>p.blank?pi:null).filter(x=>x!==null);
  const allFilled = blankIdxs.every(pi=>it.filled[pi]!==null);
  if(!allFilled){ fb.style.color='var(--text-faint)'; fb.textContent='Fill every blank first.'; return; }
  const ok = blankIdxs.every(pi=>it.filled[pi]===it.parts[pi].answer);
  fb.style.color = ok?'var(--celadon)':'var(--vermilion)';
  fb.textContent = ok ? '✓ Correct!' : 'Not quite — check each piece against the hint above.';
  gradeAnswer(id+'-'+i, ok, 8);
};

/* ---- Unit 0: Two Systems ---- */
function renderUnit0(el){
  chapterHeader(el, 'Foundations', 'Unit 0 — Two Systems, One Country', 'Why Korean runs two full number systems side by side, and how to stop guessing which one to use.');
  el.insertAdjacentHTML('beforeend', bookmarkRow('unit0'));
  el.insertAdjacentHTML('beforeend', `
    <p>English has one set of numbers. Korean has two — <strong>completely separate word sets</strong> for the same quantities — and which one you use depends entirely on what you're counting, not on any pattern you can guess from English.</p>
    <div class="callout fact"><span class="callout-label">✨ Fun Fact</span>Sino-Korean numbers (일, 이, 삼...) were borrowed from Chinese centuries ago, alongside huge amounts of Korean vocabulary — the same way English borrowed heavily from Latin and French. Native Korean numbers (하나, 둘, 셋...) are original to the language, with no foreign root at all.</div>
    <p>Here's the division that matters, framed as two characters with two different jobs:</p>
  `);
  el.insertAdjacentHTML('beforeend', `
    <div class="card">
      <h4>${numChip('Sino-Korean','sino')} — "The Calculator"</h4>
      <p>Math, money, dates, phone numbers, minutes, addresses — anything abstract, official, or measured.</p>
    </div>
    <div class="card">
      <h4>${numChip('Native Korean','native')} — "The Counter"</h4>
      <p>Counting real things in front of you — people, animals, objects, age, hours, times-you've-done-something.</p>
    </div>
  `);
  el.insertAdjacentHTML('beforeend', `
    <div class="callout warn"><span class="callout-label">⚠ Common Mistake</span>Don't try to memorize a rule like "big numbers use Sino." The actual dividing line is <em>abstract measurement vs. concrete counting</em> — money and minutes are Sino even though they're often small numbers, and age is Native even though people get quite large numbers of years old.</div>
  `);
  el.appendChild(buildChoice('u0-pc', [
    {promptKr:'', promptPlain:'A shopkeeper tells you the price of an item.', eng:'Which system?', options:['Sino-Korean','Native Korean'], answer:'Sino-Korean', explain:'Money is always Sino-Korean, no matter how small the amount.'},
    {promptKr:'', promptPlain:'Someone tells you how many apples are in a basket.', eng:'Which system?', options:['Native Korean','Sino-Korean'], answer:'Native Korean', explain:'Counting physical objects in front of you is Native Korean.'},
  ]));
  el.insertAdjacentHTML('beforeend', noteBox('unit0'));
}

/* ---- Unit 1: Sino-Korean ---- */

  el.insertAdjacentHTML('beforeend', `<p>The good news first: Sino-Korean numbers are <em>more</em> regular than English. There's no "eleven, twelve" irregularity — every number above ten is built the same way, every time.</p>`);
  el.insertAdjacentHTML('beforeend', `
    <div class="card">
      <table class="cheat-table">
        <tr><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th></tr>

/* ---- Unit 2: Native Korean ---- */

  el.insertAdjacentHTML('beforeend', bookmarkRow('unit2'));
  el.insertAdjacentHTML('beforeend', `<p>Native Korean numbers have their own words for both the ones (하나, 둘, 셋...) and the tens (열, 스물, 서른...) — they don't share roots with Sino-Korean at all.</p>`);
  el.insertAdjacentHTML('beforeend', `
    <div class="card">
      <table class="cheat-table">
        <tr><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th></tr>
        <tr><td class="kr">하나</td><td class="kr">둘</td><td class="kr">셋</td><td class="kr">넷</td><td class="kr">다섯</td><td class="kr">여섯</td><td class="kr">일곱</td><td class="kr">여덟</td><td class="kr">아홉</td><td class="kr">열</td></tr>
        <tr><th>20</th><th>30</th><th>40</th><th>50</th><th>60</th><th>70</th><th>80</th><th>90</th><th colspan="2"></th></tr>
        <tr><td class="kr">스물</td><td class="kr">서른</td><td class="kr">마흔</td><td class="kr">쉰</td><td class="kr">예순</td><td class="kr">일흔</td><td class="kr">여든</td><td class="kr">아흔</td><td colspan="2"></td></tr>
      </table>
    </div>
  `);
  el.insertAdjacentHTML('beforeend', `
    <div class="callout fact"><span class="callout-label">✨ Fun Fact</span>Native Korean numbers <strong>stop at 99</strong>. There is no native word for 100 — for anything from 100 upward, Korean switches entirely to Sino-Korean, even when counting physical objects. "100 apples" is 사과 백 개, using 백 (Sino), not a native word.</div>
  `);
  el.appendChild(document.createRange().createContextualFragment(dialogueBlock('Case File: The Market', [

    {spk:'유나', kr:`그럼 사과 ${numChip('여섯','native')} 개 주세요.`, rom:'Geureom sagwa yeoseot gae juseyo.', eng:'Then give me six apples, please.'},

  el.appendChild(buildChoice('u2-pc', [

    {promptKr:'', promptPlain:'150 apples', eng:'Which system do you need here, and why?', options:['Sino-Korean — Native stops at 99','Native Korean — it\'s a physical object'], answer:'Sino-Korean — Native stops at 99', explain:'Even though you\'re counting real apples, once you cross 99 you must switch to Sino-Korean.'},
  ]));
  el.insertAdjacentHTML('beforeend', noteBox('unit2'));
}

function renderUnit4(el){

  el.insertAdjacentHTML('beforeend', `
    <p>하나, 둘, 셋, 넷, and 스물 all change shape the moment they're placed directly in front of a counter word. Say them alone, and they keep their full form. Put a counter right after, and they shrink.</p>
  `);
  el.insertAdjacentHTML('beforeend', `
    <div class="card">
      <table class="cheat-table">
        <tr><th>Alone</th><th>Before a counter</th><th>Example</th></tr>
        <tr><td class="kr">하나</td><td class="kr">${numChip('한','native')}</td><td class="kr">한 개 (one item)</td></tr>
        <tr><td class="kr">둘</td><td class="kr">${numChip('두','native')}</td><td class="kr">두 개 (two items)</td></tr>
        <tr><td class="kr">셋</td><td class="kr">${numChip('세','native')}</td><td class="kr">세 개 (three items)</td></tr>
        <tr><td class="kr">넷</td><td class="kr">${numChip('네','native')}</td><td class="kr">네 개 (four items)</td></tr>
        <tr><td class="kr">스물</td><td class="kr">${numChip('스무','native')}</td><td class="kr">스무 살 (20 years old)</td></tr>

    </div>
    <div class="callout tip"><span class="callout-label">💡 Mnemonic</span>Think of it like English "a" becoming "an" before a vowel — a tiny automatic shift that happens because of what comes right after, not a whole new word to learn separately.</div>
  `);
  el.appendChild(document.createRange().createContextualFragment(dialogueBlock('Case File: Convenience Store', [
    {spk:'준호', kr:`이 과자 ${numChip('두','native')} 개하고 물 ${numChip('한','native')} 병 주세요.`, rom:'I gwaja du gae-hago mul han byeong juseyo.', eng:'Give me two of these snacks and one bottle of water, please.'},

}

/* ---- Counter Matchmaker ---- */
function renderMatching(el){
  chapterHeader(el, 'Practice', 'Counter Matchmaker', 'Match each object type to its correct counter word.');
  el.insertAdjacentHTML('beforeend', bookmarkRow('matching'));
  const pairs = [
    {obj:'사과 (apple)', counter:'개'}, {obj:'학생 (student)', counter:'명'}, {obj:'강아지 (puppy)', counter:'마리'},
    {obj:'책 (book)', counter:'권'}, {obj:'커피 (coffee)', counter:'잔'}, {obj:'표 (ticket)', counter:'장'},
  ];
  const cards = [];
  pairs.forEach(p=>{ cards.push({key:p.obj, side:'obj', val:p.obj}); cards.push({key:p.obj, side:'counter', val:p.counter}); });
  const shuffled = shuffle(cards);
  const grid = document.createElement('div'); grid.className='match-grid'; grid.id='matchGrid';
  grid.innerHTML = shuffled.map((c,i)=>`<div class="match-card" data-i="${i}" data-key="${c.key}" onclick="matchClick(${i})"><span class="${c.side==='counter'?'kr':''}">${c.val}</span></div>`).join('');
  const status = document.createElement('div'); status.id='matchStatus'; status.style.cssText='text-align:center;margin:14px 0;color:var(--text-dim)';
  el.appendChild(grid); el.appendChild(status);
  const retry = document.createElement('div'); retry.className='btn-row'; retry.style.justifyContent='center';
  retry.innerHTML = `<button class="btn secondary" onclick="goTo('matching')">🔄 New Set</button>`;
  el.appendChild(retry);
  window._matchData = shuffled; window._matchSel=[]; window._matchFound=0; window._matchTries=0;
  updateMatchStatus();
  el.appendChild(document.createRange().createContextualFragment(noteBox('matching')));
}
function updateMatchStatus(){ document.getElementById('matchStatus').textContent = `Pairs found: ${window._matchFound} / ${window._matchData.length/2}   •   Tries: ${window._matchTries}`; }
function matchClick(i){
  const cards = document.querySelectorAll('#matchGrid .match-card');
  const cardEl = cards[i];
  if(cardEl.classList.contains('matched') || window._matchSel.includes(i)) return;
  cardEl.classList.add('sel'); window._matchSel.push(i);
  if(window._matchSel.length===2){
    window._matchTries++;
    const [a,b] = window._matchSel;
    const same = window._matchData[a].key === window._matchData[b].key;
    setTimeout(()=>{
      if(same){ cards[a].classList.add('matched'); cards[b].classList.add('matched'); window._matchFound++; if(window._matchFound===window._matchData.length/2){ addXP(20); } }
      cards[a].classList.remove('sel'); cards[b].classList.remove('sel');
      window._matchSel=[];
      updateMatchStatus();
    }, same?250:650);
  }
}

/* ============================================================
   9. SHARED NUMBER QUESTION BANK (generated via the converters
      above, so every value is guaranteed correct)
   ============================================================ */
const NUMBER_BANK = (function(){
  const bank = [];
  [4,7,12,23,56,89].forEach(n=>{
    const wrong = toNative(n) ? [toNative(n)] : [];
    bank.push({promptPlain:String(n), eng:'How do you say this in Sino-Korean?', options:shuffle([toSino(n), ...wrong, toSino(n+10>99?n-10:n+10)]).slice(0,3).includes(toSino(n))?shuffle([toSino(n), ...(wrong.length?wrong:[toSino(n)+'십']), toSino(Math.max(1,n-3))]):[toSino(n)], answer:toSino(n), key:'bank-sino-'+n});
  });
  [3,6,9,14,27,45].forEach(n=>{
    bank.push({promptPlain:String(n), eng:'How do you say this in Native Korean?', options:shuffle([toNative(n), toSino(n), toNative(Math.max(1,n-2))]), answer:toNative(n), key:'bank-native-'+n});
  });
  [1,2,3,4,20].forEach(n=>{
    bank.push({promptPlain:`${n} + a counter (e.g. 개)`, eng:'Which shape-shifted form goes directly before the counter?', options:shuffle([NATIVE_MOD[n], toNative(n), toSino(n)]), answer:NATIVE_MOD[n], key:'bank-shift-'+n});
  });
  [[3,45],[8,30],[11,50],[2,15]].forEach(([h,m])=>{
    bank.push({promptPlain:`${h}:${m<10?'0':''}${m}`, eng:'How do you read this time?', options:shuffle([`${toNativeCounter(h)} 시 ${toSino(m)} 분`, `${toSino(h)} 시 ${toNativeCounter(m)} 분`, `${toNativeCounter(h)} 시 ${toNativeCounter(m)} 분`]), answer:`${toNativeCounter(h)} 시 ${toSino(m)} 분`, key:'bank-time-'+h+'-'+m});
  });
  [30000,120000,45000,600000].forEach(n=>{
    const man = n/10000;
    bank.push({promptPlain:'₩'+n.toLocaleString(), eng:'How do you read this price?', options:shuffle([toSino(man)+'만 원', toSino(n/1000)+'천 원', toNative(man>99?man%99||1:man)+'만 원']), answer:toSino(man)+'만 원', key:'bank-money-'+n});
  });
  return bank;
})();

/* ---- Speed Dial ---- */
function renderSpeedRound(el){
  chapterHeader(el, 'Practice', 'Speed Dial', 'Beat the clock across every number skill in this course. Purely for fun; never required to progress.');
  el.insertAdjacentHTML('beforeend', bookmarkRow('speed-round'));
  const wrap = document.createElement('div'); wrap.id='speedWrap';
  el.appendChild(wrap);
  const TIME = 6;
  let idx=0, score=0, timer=null;
  const data = shuffle(NUMBER_BANK).slice(0,14);
  function draw(){
    clearInterval(timer);
    if(idx>=data.length){
      wrap.innerHTML = `<div class="quiz-score">Score: ${score} / ${data.length}</div>
        <div class="speed-stats">Best streak so far in the course: <b>${State.bestStreak}</b></div>
        <div class="btn-row" style="justify-content:center"><button class="btn secondary" onclick="goTo('speed-round')">Play Again</button></div>`;
      addXP(score*2);
      markComplete('speed-round');
      return;
    }
    const q = data[idx];
    wrap.innerHTML = `
      <div class="speed-stats">Score: <b>${score}</b> &nbsp;•&nbsp; Streak: <b>${State.streak}</b> &nbsp;•&nbsp; Best: <b>${State.bestStreak}</b></div>
      <div class="speed-bar-track"><div class="speed-bar-fill" id="speedBar" style="width:100%"></div></div>
      <div class="quiz-q">
        <div class="qtext">${q.promptPlain}</div>
        <div class="sen-eng" style="margin-bottom:10px">${q.eng}</div>
        <div class="qopts">${q.options.map(o=>`<button class="qopt kr" data-o="${o}">${o}</button>`).join('')}</div>
        <div class="qfeedback"></div>
        <div style="margin-top:8px;color:var(--text-faint);font-size:.78em">${idx+1} / ${data.length}</div>
      </div>`;
    wrap.querySelectorAll('.qopt').forEach(btn=>{ btn.onclick = ()=>answer(btn.dataset.o===q.answer, btn, q); });
    const bar = document.getElementById('speedBar');
    const t0 = Date.now();
    timer = setInterval(()=>{
      const pct = Math.max(0, 100-((Date.now()-t0)/(TIME*1000))*100);
      bar.style.width = pct+'%';
      if(pct<=0) answer(false, null, q);
    }, 100);
  }
  function answer(ok, btn, q){
    clearInterval(timer);
    wrap.querySelectorAll('.qopt').forEach(b=>{ b.disabled=true; if(b.dataset.o===q.answer) b.classList.add('correct'); });
    if(btn && !ok) btn.classList.add('wrong');
    if(ok) score++;
    gradeAnswer('speed-'+q.key, ok, 4);
    setTimeout(()=>{ idx++; draw(); }, 500);
  }
  draw();
  el.appendChild(document.createRange().createContextualFragment(noteBox('speed-round')));
}

function renderReviewQuiz(el){
  chapterHeader(el, 'Practice', 'Spaced-Repetition Review', 'Pulled from every unit. Missed items resurface until answered correctly three times in a row.');
  el.insertAdjacentHTML('beforeend', bookmarkRow('review-quiz'));
  const data = [...NUMBER_BANK].sort((a,b)=> (State.mistakes[a.key]||0) - (State.mistakes[b.key]||0));
  const quizData = shuffle(data.slice(0,14)).map(q=>({q:q.promptPlain, eng:q.eng, options:q.options, answer:q.answer, key:q.key}));

async function verifyCertPayment(response, orderId, nm){
  const payArea = document.getElementById('certPayArea');
  if(payArea) payArea.innerHTML = `<div class="hkl-loading-spinner"></div><p class="hkl-secure-note">Verifying payment…</p>`;

  try{
    const verifyRes = await fetch(`${SUPPORT_API_BASE}/api/verify-payment`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        orderId: response.razorpay_order_id || orderId,
        paymentId: response.razorpay_payment_id,
        signature: response.razorpay_signature,
        name: nm
      })
    });
    const result = await verifyRes.json();
    if(!result.verified) throw new Error('Payment verification failed');

    localStorage.setItem('kn_cert_payment_id', result.paymentId);
    goTo('certificate'); // re-render — will now show the unlocked state
  } catch(err){
    console.error('Certificate verification failed:', err);
    if(payArea){
      payArea.innerHTML = `<p class="hkl-secure-note" style="color:var(--vermilion)">We couldn't verify your payment. If you were charged, please contact us.</p><button class="btn" id="certRetryBtn2">Try again</button>`;
      document.getElementById('certRetryBtn2').onclick = () => initiateCertPayment(nm);
    }
  }
}

function renderCertUnlocked(el, paymentId, nm){
  el.insertAdjacentHTML('beforeend', `
  <div class="card">
    <label>Your name: <input type="text" id="certName" placeholder="Enter your name" style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:6px 10px; margin-left:8px;"></label>

  </div>
  <div class="certificate" id="certBody">
    <div class="eyebrow" style="text-align:center">Hookitlingo · Korean Grammar Part 3: Numbers, Counters &amp; Time</div>
    <h2>Certificate of Completion</h2>
    <p>This certifies that</p>
    <div class="cert-name" id="certNameDisplay">________________________</div>
    <p>has successfully completed <strong>Korean Grammar Part 3: Numbers, Counters &amp; Time</strong>, demonstrating fluent, correct use of both Sino-Korean and Native Korean number systems, counter words, telling time, dates, and money.</p>

    <p style="margin-top:8px; color:var(--celadon); font-size:.8em;">✓ Certificate unlocked</p>
  </div>
  <p id="certDownloadStatus" class="hkl-secure-note"></p>
  `);

  document.getElementById('certName').value = nm; // set safely — no HTML parsing
  document.getElementById('certNameDisplay').textContent = nm || '________________________';

  document.getElementById('certUpdateBtn').onclick = () => {
    const v = document.getElementById('certName').value.trim();
    localStorage.setItem('kn_name', v);
    document.getElementById('certNameDisplay').textContent = v || '________________________';
  };

  document.getElementById('certDownloadBtn').onclick = async () => {
    const currentName = document.getElementById('certName').value.trim() || nm;
    const statusEl = document.getElementById('certDownloadStatus');
    statusEl.style.color = '';
    statusEl.textContent = 'Generating your certificate…';
    try{
      const url = `${SUPPORT_API_BASE}/api/certificate?paymentId=${encodeURIComponent(paymentId)}&name=${encodeURIComponent(currentName)}&course=numbers`;
      const res = await fetch(url);
      if(!res.ok){
        const err = await res.json().catch(()=>({error:'Download failed'}));
        if(res.status === 403){
          localStorage.removeItem('kn_cert_payment_id');
          statusEl.style.color = 'var(--vermilion)';
          statusEl.textContent = "We couldn't verify that payment for this course. Please unlock the certificate again.";
          setTimeout(() => goTo('certificate'), 1800);
          return;
        }
        throw new Error(err.error || 'Download failed');
      }
      const blob = await res.blob();
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objUrl; a.download = 'hookitlingo-numbers-certificate.pdf';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(objUrl);
      statusEl.textContent = '';
    }catch(err){
      console.error('Certificate download failed:', err);
      statusEl.style.color = 'var(--vermilion)';
      statusEl.textContent = err.message;
    }
  };
}

/* ============================================================
   10. QUIZ ENGINE (shared, with mistakes-bank integration)
   ============================================================ */
function buildQuiz(id, data, isFinal){
  const wrap = document.createElement('div');
  wrap.id = id;
  let idx=0, score=0;
  function draw(){
    if(idx>=data.length){
      const pct = Math.round((score/data.length)*100);
      wrap.innerHTML = `<div class="quiz-score">Score: ${score} / ${data.length} (${pct}%)</div>
        ${isFinal ? (pct>=70 ? `<div class="callout"><span class="callout-label">Passed!</span>You've earned your certificate. <button class="btn" style="margin-top:8px" onclick="markComplete('final-exam'); goTo('certificate')">Go to Certificate →</button></div>` : `<div class="callout warn"><span class="callout-label">Almost there</span>Review the Boss Battle units and try again — 70% is the passing mark.</div>`) : ''}
        <div class="btn-row" style="justify-content:center"><button class="btn secondary" onclick="${isFinal?"goTo('final-exam')":"goTo(State.current)"}">Retry Quiz</button></div>`;
      addXP(score*3);
      if(isFinal && pct>=70) markComplete('final-exam');
      return;
    }
    const q = data[idx];
    wrap.innerHTML = `
      <div class="quiz-q">
        <div class="qtext">${(q.q||'').replace('___','<span class="blank-mark">___</span>')}</div>
        ${q.eng?`<div class="sen-eng" style="margin-bottom:10px">${q.eng}</div>`:''}
        <div class="qopts">${q.options.map(o=>`<button class="qopt kr" data-o="${o.replace(/"/g,'&quot;')}">${o}</button>`).join('')}</div>
        <div class="qfeedback"></div>
        <div style="margin-top:8px;color:var(--text-faint);font-size:.78em">${idx+1} / ${data.length}</div>
      </div>`;
    wrap.querySelectorAll('.qopt').forEach(btn=>{
      btn.onclick = ()=>{
        wrap.querySelectorAll('.qopt').forEach(b=>b.disabled=true);
        const correct = btn.dataset.o === q.answer;
        btn.classList.add(correct?'correct':'wrong');
        if(!correct) wrap.querySelector(`.qopt[data-o="${CSS.escape(q.answer)}"]`)?.classList.add('correct');
        wrap.querySelector('.qfeedback').textContent = correct ? '✓ Correct!' : `The correct answer is "${q.answer}".`;
        if(correct) score++;
        if(q.key) registerAnswer(q.key, correct);
        setTimeout(()=>{ idx++; draw(); }, 850);
      };
    });
  }
  draw();
  return wrap;
}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(arr,n){ return shuffle(arr).slice(0,n); }

(function spawnPetals(){
  const host = document.getElementById('petals');
  if(!host) return;
  const colors = ['var(--petal)','var(--vermilion)','var(--gold)'];
  const count = window.innerWidth < 700 ? 10 : 18;
  for(let i=0;i<count;i++){
    const size = 10 + Math.random()*12;
    const left = Math.random()*100;
    const dur = 10 + Math.random()*12;
    const delay = -(Math.random()*dur);
    const drift = Math.round(Math.random()*90-45)+'px';
    const fill = colors[Math.floor(Math.random()*colors.length)];
    const rotStart = Math.round(Math.random()*360);
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `left:${left}%; width:${size}px; height:${size}px; animation-duration:${dur}s; animation-delay:${delay}s; --drift:${drift}; transform:rotate(${rotStart}deg);`;
    p.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 1c5 4.5 5 10.5 0 14-5-3.5-5-9.5 0-14Z" fill="${fill}" opacity="0.75"/></svg>`;
    host.appendChild(p);
  }
})();
